function isPast(d) { return d < TODAY; }

        if(w.type==="Corretiva" && freq) init[`${w.item}_${freq||"Mensal"}_${mk}`] = "corrective";
      }
      if(w.status==="Cancelada") {
        const mi = parseInt(w.date.split("-")[1])-1;
        const mk = MONTH_KEYS[mi];
        const freq = w.freq === "—" ? "Mensal" : w.freq;
        init[`${w.item}_${freq}_${mk}`] = "cancelled";
      }
    });
    return init;
  });

  const setCellStatus = useCallback((cellKey, status) => {

    const p=wo.filter(w=>w.type==="Preventiva").length, c=wo.filter(w=>w.type==="Corretiva").length, pred=wo.filter(w=>w.type==="Preditiva").length;
    const iss=wo.filter(w=>w.hasIssue).length;
    return {total:wo.length,done:d,sched:s,cancel:can,prev:p,corr:c,pred:pred,issues:iss};
  },[wo]);

  const monthStats = useMemo(() => MONTH_FULL.map((m,i) => {
    const items = wo.filter(w=>w.date.split("-")[1]===String(i+1).padStart(2,"0"));
    return {month:m,short:MONTH_KEYS[i],total:items.length,done:items.filter(w=>w.status==="Realizada").length,sched:items.filter(w=>w.status==="Agendada").length,cancel:items.filter(w=>w.status==="Cancelada").length,prev:items.filter(w=>w.type==="Preventiva").length,corr:items.filter(w=>w.type==="Corretiva").length,pred:items.filter(w=>w.type==="Preditiva").length};
  }),[wo]);

  const filtered = useMemo(() => wo.filter(w => {

    if(fType!=="all"&&w.type!==fType) return false;
    if(fEquip!=="all"&&w.item!==fEquip) return false;
    if(fMonth!=="all") { const mi=MONTH_FULL.indexOf(fMonth); if(parseInt(w.date.split("-")[1])!==mi+1) return false; }

  const getPamDays = useCallback((sysId, monthKey, freq) => {
    const key = `${sysId}_${freq}_${monthKey}`;
    if (dateEdits[key]) return dateEdits[key];
    if (freq==="Mensal") return PAM_MENSAL[sysId]?.[monthKey] || [];
    if (freq==="Trimestral") {
      const q = PAM_TRIMESTRAL[sysId];
      if(!q) return [];
      for(const t of ["T1","T2","T3","T4"]) { if(q[t]?.[monthKey]) return q[t][monthKey]; }
      return [];
    }
    if (freq==="Semestral") {
      const s = PAM_SEMESTRAL[sysId];
      if(!s) return [];
      for(const sem of ["S1","S2"]) { if(s[sem]?.[monthKey]) return s[sem][monthKey]; }
      return [];
    }
    return [];

          const mk = MONTH_KEYS[mi];

          days.forEach(d => {
            const dateStr = `2026-${String(mi+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const diff = daysBetween(TODAY, dateStr);
            if(diff > 0 && diff <= 45) items.push({system:sys.id,name:sys.name,freq,date:dateStr,daysLeft:diff});

    const total = data.reduce((s,d)=>s+d.v,0);

    let off=0;

          {card("Alertas",stats.issues,T.or)}
        </div>

        <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Manutenções por Mês — 2026</div>

            {monthStats.map((m,i) => (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                {m.total>0&&<span style={{fontSize:13,fontWeight:700,color:T.txB}}>{m.total}</span>}

                  <div style={{flex:1,borderRadius:"2px 2px 0 0",height:`${(m.prev/maxBar)*100}%`,background:T.bl,minHeight:m.prev>0?3:0}}/>
                  {m.corr>0&&<div style={{flex:1,borderRadius:"2px 2px 0 0",height:`${(m.corr/maxBar)*100}%`,background:T.rd,minHeight:3}}/>}
                  {m.pred>0&&<div style={{flex:1,borderRadius:"2px 2px 0 0",height:`${(m.pred/maxBar)*100}%`,background:T.pu,minHeight:3}}/>}
                </div>
                <span style={{fontSize:13,color:T.txM,fontWeight:600}}>{m.short}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:14,marginTop:10,justifyContent:"center"}}>
            {[[T.bl,"Preventiva"],[T.rd,"Corretiva"],[T.pu,"Preditiva"]].map(([c,l])=><span key={l} style={{display:"flex",alignItems:"center",gap:4,fontSize:13,color:T.txM}}><span style={{width:7,height:7,borderRadius:2,background:c}}/>{l}</span>)}
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {/* Upcoming */}
          <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16}}>
            <div style={{fontSize:13,fontWeight:700,color:T.yl,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>⏱ Próximas Manutenções</div>
            {upcoming.length===0&&<p style={{fontSize:13,color:T.txM}}>Sem manutenções próximas.</p>}
            {upcoming.map((u,i) => {
              const uc = u.daysLeft<=7?T.rd:u.daysLeft<=21?T.or:T.yl;
              return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:i<upcoming.length-1?`1px solid ${T.brd}`:"none"}}>
                <div><span style={{fontSize:13,fontWeight:700,color:T.txB}}>{u.system}</span><span style={{fontSize:13,color:T.txM,marginLeft:6}}>{u.freq}</span><span style={{fontSize:13,color:T.txM,marginLeft:6}}>{fmtDate(u.date)}</span></div>
                <span style={{fontSize:13,fontWeight:700,color:uc,background:`${uc}15`,padding:"2px 7px",borderRadius:3}}>{u.daysLeft}d</span>
              </div>;
            })}
          </div>
          {/* Issues */}
          <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16}}>
            <div style={{fontSize:13,fontWeight:700,color:T.or,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>⚠ Alertas Activos</div>
            {issues.map((w,i) => (
              <div key={i} style={{padding:"8px 10px",marginBottom:6,borderRadius:6,background:"#f8f9fa",border:`1px solid ${T.brd}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:700,color:T.txB}}>OS#{w.os} — {w.item}</span>
                  <span style={{fontSize:13,color:T.txM}}>{fmtDate(w.date)}</span>
                </div>
                <p style={{margin:0,fontSize:13,color:T.txM,lineHeight:1.5}}>{w.notes}</p>
                {w.disposition&&<div style={{marginTop:4,fontSize:13,color:T.yl}}>→ {w.disposition}</div>}
              </div>
            ))}
          </div>
        </div>
      </div>}

      {/* ═══ ORDENS DE SERVIÇO ═══ */}
      {tab==="os"&&<div data-tab="os">
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
          {sel(fStatus,setFS,[["all","Todos os estados"],["Realizada","Realizada"],["Agendada","Agendada"],["Cancelada","Cancelada"]])}
          {sel(fType,setFT,[["all","Todos os tipos"],["Preventiva","Preventiva"],["Corretiva","Corretiva"],["Preditiva","Preditiva"]])}
          {sel(fEquip,setFE,[["all","Todos os equipamentos"],...SYSTEMS.map(s=>[s.id,s.id])])}
          {sel(fMonth,setFM,[["all","Todos os meses"],...MONTH_FULL.map(m=>[m,m])])}
          <span style={{fontSize:13,color:T.txM,marginLeft:4}}>{filtered.length}/{wo.length} registos</span>
          <button onClick={()=>setShowAdd(!showAdd)} style={{marginLeft:"auto",padding:"6px 12px",borderRadius:5,border:`1px solid ${T.ac}`,background:"transparent",color:T.ac,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:ff}}>+ Nova OS</button>
        </div>

        {showAdd&&<div style={{background:"#f0f1f3",borderRadius:8,padding:14,marginBottom:14,display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr 1fr auto",gap:8,alignItems:"end"}}>
          <div><div style={{fontSize:13,color:T.txM,marginBottom:3}}>OS#</div><input value={newWo.os} onChange={e=>setNewWo(p=>({...p,os:e.target.value}))} style={inputSt} placeholder="260018"/></div>
          <div><div style={{fontSize:13,color:T.txM,marginBottom:3}}>Data</div><input type="date" value={newWo.date} onChange={e=>setNewWo(p=>({...p,date:e.target.value}))} style={inputSt}/></div>
          <div><div style={{fontSize:13,color:T.txM,marginBottom:3}}>Sistema</div><select value={newWo.item} onChange={e=>setNewWo(p=>({...p,item:e.target.value}))} style={inputSt}>{SYSTEMS.map(s=><option key={s.id} value={s.id}>{s.id}</option>)}</select></div>
          <div><div style={{fontSize:13,color:T.txM,marginBottom:3}}>Tipo</div><select value={newWo.type} onChange={e=>setNewWo(p=>({...p,type:e.target.value}))} style={inputSt}><option>Preventiva</option><option>Corretiva</option><option>Preditiva</option></select></div>
          <div><div style={{fontSize:13,color:T.txM,marginBottom:3}}>Frequência</div><select value={newWo.freq} onChange={e=>setNewWo(p=>({...p,freq:e.target.value}))} style={inputSt}><option>Mensal</option><option>Trimestral</option><option>Semestral</option><option>—</option></select></div>
          <div><div style={{fontSize:13,color:T.txM,marginBottom:3}}>Estado</div><select value={newWo.status} onChange={e=>setNewWo(p=>({...p,status:e.target.value}))} style={inputSt}><option>Agendada</option><option>Realizada</option><option>Cancelada</option></select></div>
          <button onClick={addOrder} style={{padding:"6px 14px",borderRadius:5,border:"none",background:T.gn,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:ff,height:30}}>Guardar</button>
        </div>}

        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 3px",fontSize:11}}>
            <thead><tr>
              {["OS#","Data","Sistema","Freq.","Tipo","Estado","Notas",""].map(h=><th key={h} style={{textAlign:"left",padding:"6px 10px",fontSize:13,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,fontWeight:700,borderBottom:`1px solid ${T.brd}`}}>{h}</th>)}
            </tr></thead>
            <tbody>{filtered.map((w,i)=>{
              const isEd = editingWo===w.id;
              const edSt = {...inputSt,padding:"4px 6px",fontSize:13,width:"auto"};
              return [
              <tr key={w.id} style={{background:w.status==="Cancelada"?"#fff0f0":w.hasIssue?"#fff8f0":"#fff",borderBottom:`1px solid ${T.brd}`}}>
                <td style={{padding:"8px 10px",fontWeight:700,color:T.txB,borderRadius:"6px 0 0 6px",borderLeft:w.status==="Cancelada"?`3px solid ${T.rd}`:w.hasIssue?`3px solid ${T.or}`:"3px solid transparent"}}>
                  {isEd?<input value={w.os} onChange={e=>updateField(w.id,"os",e.target.value)} style={{...edSt,width:65}}/>:w.os}
                </td>
                <td style={{padding:"8px 10px",color:T.txM}}>
                  {isEd?<input type="date" value={w.date} onChange={e=>updateField(w.id,"date",e.target.value)} style={{...edSt,width:120}}/>:fmtDate(w.date)}
                </td>
                <td style={{padding:"8px 10px",fontWeight:600,color:T.tx}}>
                  {isEd?<select value={w.item} onChange={e=>updateField(w.id,"item",e.target.value)} style={edSt}>{SYSTEMS.map(s=><option key={s.id} value={s.id}>{s.id}</option>)}</select>:w.item}
                </td>
                <td style={{padding:"8px 10px"}}>
                  {isEd?<select value={w.freq} onChange={e=>updateField(w.id,"freq",e.target.value)} style={edSt}><option>Mensal</option><option>Trimestral</option><option>Semestral</option><option>—</option></select>:<Badge color={T.cy} bg={`${T.cy}18`}>{w.freq}</Badge>}
                </td>
                <td style={{padding:"8px 10px"}}>
                  {isEd?<select value={w.type} onChange={e=>updateField(w.id,"type",e.target.value)} style={edSt}><option>Preventiva</option><option>Corretiva</option><option>Preditiva</option></select>:<Badge color={w.type==="Corretiva"?T.rd:w.type==="Preditiva"?T.pu:T.bl} bg={w.type==="Corretiva"?`${T.rd}18`:w.type==="Preditiva"?`${T.pu}18`:`${T.bl}18`}>{w.type}</Badge>}
                </td>
                <td style={{padding:"8px 10px"}}>
                  {isEd?<select value={w.status} onChange={e=>updateField(w.id,"status",e.target.value)} style={edSt}><option>Agendada</option><option>Realizada</option><option>Cancelada</option></select>:<Dot color={w.status==="Realizada"?T.gn:w.status==="Cancelada"?T.rd:T.yl} label={w.status}/>}
                </td>
                <td style={{padding:"8px 10px",color:T.txM,maxWidth:180,fontSize:10}}>
                  {isEd?<input value={w.notes} onChange={e=>updateField(w.id,"notes",e.target.value)} style={{...edSt,width:"100%"}} placeholder="Notas..."/>:(w.notes?<span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block"}}>{w.notes}</span>:"—")}
                </td>
                <td style={{padding:"8px 10px",borderRadius:"0 6px 6px 0",whiteSpace:"nowrap"}}>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>isEd?stopEditWo():startEditWo(w)} style={{background:"transparent",border:`1px solid ${isEd?T.gn:T.ac}`,color:isEd?T.gn:T.ac,padding:"3px 8px",borderRadius:3,cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:ff}}>{isEd?"✓ OK":"✎ Editar"}</button>
                    {!isEd&&w.notes&&<button onClick={()=>setExpanded(expanded===w.id?null:w.id)} style={{background:"transparent",border:`1px solid ${T.brd}`,color:T.txM,padding:"3px 8px",borderRadius:3,cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:ff}}>{expanded===w.id?"−":"+"}</button>}
                  </div>
                </td>
              </tr>,
              expanded===w.id&&w.notes?<tr key={`n-${w.id}`}><td colSpan={8} style={{padding:"10px 14px",background:"#f8f9fa",borderRadius:6,fontSize:13,color:T.tx,lineHeight:1.6,borderLeft:`3px solid ${T.ac}`}}>
                <b style={{color:T.ac}}>Notas:</b> {w.notes}
                {isEd&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                  <div><span style={{fontSize:13,color:T.txM}}>Conclusão</span><input value={w.conclusion||""} onChange={e=>updateField(w.id,"conclusion",e.target.value)} style={{...inputSt,marginTop:2}}/></div>
                  <div><span style={{fontSize:13,color:T.txM}}>Disposição</span><input value={w.disposition||""} onChange={e=>updateField(w.id,"disposition",e.target.value)} style={{...inputSt,marginTop:2}}/></div>
                  <div><span style={{fontSize:13,color:T.txM}}>Peças Substituídas</span><select value={w.parts||""} onChange={e=>updateField(w.id,"parts",e.target.value)} style={{...inputSt,marginTop:2}}><option value="">—</option><option>Não</option><option>Sim</option></select></div>
                </div>}
                {!isEd&&w.conclusion&&<><br/><b style={{color:T.yl}}>Conclusão:</b> {w.conclusion}</>}
                {!isEd&&w.disposition&&<><br/><b style={{color:T.gn}}>Disposição:</b> {w.disposition}</>}
              </td></tr>:null
              ];
            })}
            </tbody>
          </table>
        </div>
      </div>}

      {/* ═══ PLANO ANUAL ═══ */}
      {tab==="plano"&&<div data-tab="plano">
        {[
          {freq:"Mensal", label:"ACTIVIDADES MENSAIS 每月活動", labelZh:"每月活動",
           desc:"Medição de parâmetros operacionais, inspeções de segurança, verificações de vazamentos, ruídos, vibrações e isolamento térmico, limpeza básica e registo nas fichas de manutenção.",
           descZh:"測量操作參數、安全檢查、洩漏驗證、噪音、振動和熱絕緣、基本清潔及記錄日誌",
           systems: SYSTEMS},
          {freq:"Trimestral", label:"ACTIVIDADES TRIMESTRAIS 季度活動", labelZh:"季度活動",
           desc:"Purga e limpeza de strainers, limpeza profunda de filtros e verificação de drenos. Registo nas fichas de manutenção.",
           descZh:"清洗和清理過濾器，深度清潔濾網，並檢查排水管道。記錄在維護日誌中。",
           systems: SYSTEMS.filter(s=>["BOMB","SPLI","VC","UTA"].includes(s.id))},
          {freq:"Semestral", label:"ACTIVIDADES SEMESTRAIS 半年活動", labelZh:"半年活動",
           desc:"Lubrificação, verificação de fixações, limpeza de coils, inspeção de componentes e registro de observações (além das mensais).",
           descZh:"潤滑、檢查緊固件、清潔線圈、檢查零件、記錄觀察結果（除每月一次的觀察外）。",
           systems: SYSTEMS},
        ].map(section => {
          const periodHeaders = section.freq==="Trimestral" ? [
            {label:"TRIMESTRE 1 第一季",span:3,months:["Jan","Fev","Mar"]},
            {label:"TRIMESTRE 2 第二季",span:3,months:["Abr","Mai","Jun"]},
            {label:"TRIMESTRE 3 第三季",span:3,months:["Jul","Ago","Set"]},
            {label:"TRIMESTRE 4 第四季",span:3,months:["Out","Nov","Dez"]},
          ] : section.freq==="Semestral" ? [
            {label:"SEMESTRE 1 第一學期",span:6,months:["Jan","Fev","Mar","Abr","Mai","Jun"]},
            {label:"SEMESTRE 2 第二學期",span:6,months:["Jul","Ago","Set","Out","Nov","Dez"]},
          ] : null;

          return (
            <div key={section.freq} style={{marginBottom:24}}>
              <div style={{fontSize:13,fontWeight:800,color:"#fff",textTransform:"uppercase",letterSpacing:0.8,marginBottom:8,padding:"6px 12px",background:"#808080",borderRadius:2}}>{section.label}</div>

              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                  {/* Period header row (Trimestre/Semestre) */}
                  {periodHeaders && <thead><tr>
                    <th colSpan={3} style={{background:"#D9D9D9"}}/>
                    {periodHeaders.map((ph,pi) => <th key={pi} colSpan={ph.span} style={{textAlign:"center",padding:"6px 4px",fontSize:13,fontWeight:700,color:"#333",background:"#D9D9D9",borderLeft:`1px solid #bbb`,letterSpacing:0.5}}>{ph.label}</th>)}
                  </tr></thead>}
                  <thead><tr>
                    <th style={{textAlign:"left",padding:"7px 8px",color:"#333",fontSize:13,fontWeight:700,borderBottom:`2px solid #999`,minWidth:80,position:"sticky",left:0,background:"#D9D9D9",zIndex:2}}>Grupo<br/><span style={{fontWeight:400,fontSize:8}}>團體</span></th>
                    <th style={{textAlign:"left",padding:"7px 8px",color:"#333",fontSize:13,fontWeight:700,borderBottom:`2px solid #999`,minWidth:90,position:"sticky",left:80,background:"#D9D9D9",zIndex:2}}>Sistema<br/><span style={{fontWeight:400,fontSize:8}}>系統</span></th>
                    <th style={{textAlign:"left",padding:"7px 8px",color:"#333",fontSize:13,fontWeight:700,borderBottom:`2px solid #999`,minWidth:140,maxWidth:180,position:"sticky",left:170,background:"#D9D9D9",zIndex:2}}>Descrição Geral das<br/>Actividades Principais<br/><span style={{fontWeight:400,fontSize:7}}>主要活動概況</span></th>
                    {MONTH_KEYS.map(m=><th key={m} style={{textAlign:"center",padding:"7px 4px",color:"#333",fontSize:13,fontWeight:700,borderBottom:`2px solid #999`,background:"#D9D9D9",minWidth:58}}>{m} 26</th>)}
                  </tr></thead>
                  <tbody>
                    {section.systems.map((sys,si) => {
                      const isFirst = si===0;
                      const groupRowSpan = isFirst ? section.systems.length : 0;

                      return (
                        <tr key={`${sys.id}-${section.freq}`}>
                          {isFirst && <td rowSpan={groupRowSpan} style={{padding:"6px 8px",fontWeight:600,color:T.txM,fontSize:13,lineHeight:1.4,borderBottom:`1px solid ${T.brd}`,verticalAlign:"top",position:"sticky",left:0,background:"#fff",zIndex:1,borderRight:`1px solid ${T.brd}`}}>
                            Instalações de Aquecimento Ventilação e Ar Condicionado (AVAC)<br/><span style={{fontSize:13,color:T.txM}}>暖氣、通風和空調（HVAC）安裝</span>
                          </td>}
                          <td style={{padding:"6px 8px",fontWeight:700,color:T.txB,fontSize:13,borderBottom:`1px solid ${T.brd}`,position:"sticky",left:80,background:"#fff",zIndex:1,borderRight:`1px solid ${T.brd}`}}>
                            {sys.name}<br/><span style={{fontSize:13,color:T.txM,fontWeight:400}}>{sys.nameZh}</span>
                          </td>
                          {isFirst && <td rowSpan={groupRowSpan} style={{padding:"6px 8px",fontSize:13,color:T.txM,lineHeight:1.5,borderBottom:`1px solid ${T.brd}`,verticalAlign:"top",position:"sticky",left:170,background:"#fff",zIndex:1,borderRight:`1px solid ${T.brd}`,maxWidth:180}}>
                            {section.desc}<br/><span style={{color:`${T.txM}90`}}>{section.descZh}</span>
                          </td>}
                          {MONTH_KEYS.map(mk => {
                            if(sys.inactive) return <td key={mk} style={{textAlign:"center",padding:"4px",color:T.txM,fontSize:13,background:"#fff",borderBottom:`1px solid ${T.brd}`,borderLeft:`1px solid ${T.brd}`}}>(2)</td>;

                            const days = getPamDays(sys.id, mk, section.freq);
                            const cellKey = `${sys.id}_${section.freq}_${mk}`;
                            const cellStatus = cellStatuses[cellKey] || "pending";
                            const isEditingDays = editing === cellKey;
                            const isCurrent = mk === MONTH_KEYS[parseInt(TODAY.split("-")[1])-1];

                            const bgMap = {
                              completed: "#92D050",
                              corrective: "#ED7D31",
                              predictive: "#7030A0",
                              cancelled: "#FFC7CE",
                              pending: isCurrent && days.length > 0 ? "#FFF2CC" : "#fff",
                            };
                            const colorMap = {
                              completed: "#1a1a1a",
                              corrective: "#fff",
                              predictive: "#fff",
                              cancelled: "#C00000",
                              pending: "#1a1a1a",
                            };

                            return (
                              <td key={mk} style={{textAlign:"center",padding:"3px 2px",background:bgMap[cellStatus],borderBottom:`1px solid ${T.brd}`,borderLeft:`1px solid ${T.brd}`,position:"relative",minHeight:28,verticalAlign:"middle"}}>
                                {days.length > 0 ? (
                                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                                    {isEditingDays ? (
                                      <input autoFocus defaultValue={days.join(",")}
                                        onBlur={e=>{const v=e.target.value.split(",").map(Number).filter(n=>n>0&&n<32);saveDateEdit(sys.id,section.freq,mk,v);}}
                                        onKeyDown={e=>{if(e.key==="Enter"){const v=e.target.value.split(",").map(Number).filter(n=>n>0&&n<32);saveDateEdit(sys.id,section.freq,mk,v);}if(e.key==="Escape")setEditing(null);}}
                                        style={{width:42,padding:"2px 3px",border:`1px solid ${T.ac}`,borderRadius:3,background:"#f8f9fa",color:T.txB,fontSize:13,textAlign:"center",fontFamily:ff}}
                                      />
                                    ) : (
                                      <span onClick={()=>setEditing(cellKey)} style={{fontWeight:700,color:colorMap[cellStatus],fontSize:13,cursor:"pointer"}}
                                        title="Clique para editar dias">{days.join(", ")}</span>
                                    )}
                                    {!isEditingDays && (
                                      <div style={{display:"flex",gap:1}}>
                                        {[
                                          {st:"completed",icon:"✓",c:T.gn,tip:"Concluída"},
                                          {st:"corrective",icon:"⚡",c:T.or,tip:"Corretiva"},
                                          {st:"predictive",icon:"◆",c:T.pu,tip:"Preditiva"},
                                          {st:"cancelled",icon:"✕",c:T.rd,tip:"Cancelada"},
                                          {st:"pending",icon:"○",c:T.txM,tip:"Pendente"},
                                        ].map(btn => (
                                          <button key={btn.st} onClick={(e)=>{e.stopPropagation();setCellStatus(cellKey,btn.st);}}
                                            title={btn.tip}
                                            style={{
                                              width:16,height:14,padding:0,border:"none",borderRadius:2,cursor:"pointer",fontSize:13,fontWeight:700,
                                              background:cellStatus===btn.st?`${btn.c}40`:"transparent",
                                              color:cellStatus===btn.st?btn.c:`${T.txM}60`,
                                              fontFamily:ff,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",
                                            }}>{btn.icon}</button>
                                        ))}
                                      </div>
                                    )}
                                  </div>
                                ) : null}
                                {dateEdits[cellKey] && !isEditingDays && <span style={{position:"absolute",top:0,left:1,fontSize:6,color:T.pu}}>✎</span>}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              {/* Legend */}
              <div style={{display:"flex",gap:14,marginTop:8,flexWrap:"wrap"}}>
                {[
                  [T.gn,"✓","Actividades concluídas"],
                  [T.or,"⚡","Manutenção corretiva"],
                  [T.pu,"◆","Manutenção preditiva"],
                  [T.rd,"✕","Cancelada"],
                  [T.yl,"","Mês actual"],
                  [T.pu,"✎","Data alterada manualmente"],
                ].map(([c,icon,l])=><span key={l} style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:4}}>
                  <span style={{width:8,height:8,borderRadius:2,background:`${c}40`,border:`1px solid ${c}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,color:c,fontWeight:700}}>{icon}</span>{l}
                </span>)}
              </div>
            </div>
          );
        })}
        <div style={{background:"#f0f1f3",borderRadius:6,padding:12,fontSize:13,color:T.txM,lineHeight:1.7,marginTop:4}}>
          <b>(1)</b> Sempre que possível, as rotinas de manutenção serão agendadas na 3ª semana de cada mês, salvo excepção do ano novo chinês (2026) e outros feriados.<br/>
          <b>(2)</b> As unidades de tratamento de ar existentes (UTA) estão não operacionais e consideradas para substituição no futuro plano de remodelação das infraestruturas do Consulado.<br/>
          <span style={{color:T.gn}}>■</span> Actividades concluídas &nbsp;&nbsp; <span style={{color:T.or}}>■</span> Actividades de manutenção corretiva
        </div>
      </div>}

      {/* ═══ ATIVOS MONITORADOS ═══ */}
      {tab==="ativos"&&<div data-tab="ativos">
        <div style={{fontSize:13,fontWeight:800,color:T.txB,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Ativos sob Monitorização Corretiva</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
          {CORRETIVA_MONITORED.map((a,i) => {
            const sys = SYSTEMS.find(s=>s.id===a.system);
            const daysSince = daysBetween(a.since, TODAY);
            const hasEvent = !!a.lastEvent;
            return (
              <div key={i} style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,border:`1px solid ${hasEvent?`${T.or}50`:T.brd}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:12}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:800,color:T.txB}}>{a.system}</div>
                    <div style={{fontSize:13,color:T.txM}}>{sys?.name}</div>
                  </div>
                  <Badge color={hasEvent?T.or:T.gn} bg={hasEvent?`${T.or}18`:`${T.gn}18`}>{hasEvent?"Com ocorrência":"Monitorado"}</Badge>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{background:"#f8f9fa",borderRadius:5,padding:"7px 9px"}}><div style={{fontSize:13,color:T.txM,textTransform:"uppercase",letterSpacing:0.5}}>Desde</div><div style={{fontSize:13,fontWeight:700,color:T.tx}}>{fmtDate(a.since)}</div></div>
                  <div style={{background:"#f8f9fa",borderRadius:5,padding:"7px 9px"}}><div style={{fontSize:13,color:T.txM,textTransform:"uppercase",letterSpacing:0.5}}>Dias em monit.</div><div style={{fontSize:13,fontWeight:700,color:T.ac}}>{daysSince}</div></div>
                  <div style={{background:"#f8f9fa",borderRadius:5,padding:"7px 9px"}}><div style={{fontSize:13,color:T.txM,textTransform:"uppercase",letterSpacing:0.5}}>Última ocorrência</div><div style={{fontSize:13,fontWeight:700,color:hasEvent?T.or:T.txM}}>{a.lastEvent?fmtDate(a.lastEvent):"Nenhuma"}</div></div>
                  <div style={{background:"#f8f9fa",borderRadius:5,padding:"7px 9px"}}><div style={{fontSize:13,color:T.txM,textTransform:"uppercase",letterSpacing:0.5}}>Estado</div><Dot color={hasEvent?T.or:T.gn} label={hasEvent?"Activo":"Estável"}/></div>
                </div>
                {a.notes&&<div style={{marginTop:8,fontSize:13,color:T.txM,padding:"6px 8px",background:"#f8f9fa",borderRadius:4,borderLeft:`2px solid ${T.or}`}}>{a.notes}</div>}
              </div>
            );
          })}
        </div>
      </div>}

      {/* ═══ ANÁLISE ═══ */}
      {tab==="analise"&&<div data-tab="analise">
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14}}>
          {/* Volume por Tipo */}
          <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:12}}>Volume por Tipo</div>
            <Donut data={[{v:stats.prev,c:T.bl},{v:stats.corr,c:T.rd},{v:stats.pred,c:T.pu}]}/>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:10}}>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.bl}}/>Preventiva ({stats.prev})</span>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.rd}}/>Corretiva ({stats.corr})</span>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.pu}}/>Preditiva ({stats.pred})</span>
            </div>
          </div>
          {/* Estado de Manutenção */}
          <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:12}}>Estado de Manutenção</div>
            <Donut data={[{v:stats.done,c:T.gn},{v:stats.sched,c:T.yl},{v:stats.cancel,c:T.rd}]}/>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:10}}>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.gn}}/>Realizada ({stats.done})</span>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.yl}}/>Agendada ({stats.sched})</span>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.rd}}/>Cancelada ({stats.cancel})</span>
            </div>
          </div>
          {/* Conclusão após Manutenção */}
          <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:12}}>Conclusão após Manutenção</div>
            {(()=>{
              const agendar=wo.filter(w=>w.conclusion?.includes("Agendar")).length;
              const apto=wo.filter(w=>w.conclusion?.includes("Apto")||w.disposition?.includes("Apto")).length;
              const descarte=wo.filter(w=>w.disposition?.includes("descarte")).length;
              const subst=wo.filter(w=>w.conclusion?.includes("Substituição")).length;
              return <>
                <Donut data={[{v:agendar,c:T.bl},{v:apto,c:T.gn},{v:descarte,c:T.rd},{v:subst,c:T.or}]}/>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginTop:10}}>
                  <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:2}}><span style={{width:5,height:5,borderRadius:1,background:T.bl}}/>Agendar ({agendar})</span>
                  <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:2}}><span style={{width:5,height:5,borderRadius:1,background:T.gn}}/>Apto ({apto})</span>
                  <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:2}}><span style={{width:5,height:5,borderRadius:1,background:T.rd}}/>Descarte ({descarte})</span>
                  <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:2}}><span style={{width:5,height:5,borderRadius:1,background:T.or}}/>Subst. peças ({subst})</span>
                </div>
              </>;
            })()}
          </div>
          {/* Troca de Peças */}
          <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:12}}>Necessário Troca de Peças</div>
            <Donut data={[{v:stats.partsNo||wo.filter(w=>w.parts==="Não").length,c:T.bl},{v:stats.partsYes||wo.filter(w=>w.parts==="Sim").length,c:T.or}]}/>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:10}}>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.bl}}/>Não</span>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.or}}/>Sim</span>
            </div>
          </div>
        </div>

        {/* Resumo Mensal Table */}
        <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,marginTop:16}}>
          <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:10}}>Resumo e Previsões — 2026</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead><tr>
                <th style={{textAlign:"left",padding:"5px 8px",color:T.txM,fontSize:13,borderBottom:`1px solid ${T.brd}`}}>Tipo</th>
                {MONTH_KEYS.map(m=><th key={m} style={{textAlign:"center",padding:"5px 4px",color:T.txM,fontSize:13,borderBottom:`1px solid ${T.brd}`}}>{m}</th>)}
                <th style={{textAlign:"center",padding:"5px 6px",color:T.txB,fontSize:13,fontWeight:800,borderBottom:`1px solid ${T.brd}`}}>Total</th>
              </tr></thead>
              <tbody>
                {[["Total de Actividades","total",T.txB],["Preventiva","prev",T.bl],["Corretiva","corr",T.rd],["Preditiva","pred",T.pu]].map(([label,key,color])=>(
                  <tr key={key}>
                    <td style={{padding:"5px 8px",fontWeight:600,color,borderBottom:`1px solid ${T.brd}`}}>{label}</td>
                    {monthStats.map((m,i)=><td key={i} style={{textAlign:"center",padding:"5px 4px",color:m[key]>0?color:T.txM,fontWeight:m[key]>0?700:400,borderBottom:`1px solid ${T.brd}`}}>{m[key]}</td>)}
                    <td style={{textAlign:"center",padding:"5px 6px",fontWeight:800,color,borderBottom:`1px solid ${T.brd}`}}>{monthStats.reduce((s,m)=>s+m[key],0)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>}

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
