<title>CGPMHK — Gestão de Manutenção 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Calibri', 'Helvetica Neue', system-ui, sans-serif; }
  @media print {
    @page { size: A4 landscape; margin: 8mm; }
    body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; background: #fff !important; }
    [data-no-print] { display: none !important; }
    /* Hide all tabs by default when printing */
    [data-tab] { display: none !important; }
    /* Show only the active tab (single tab print) */
    body[data-print-scope="painel"] [data-tab="painel"] { display: block !important; }
    body[data-print-scope="os"] [data-tab="os"] { display: block !important; }
    body[data-print-scope="plano"] [data-tab="plano"] { display: block !important; }

    /* Show all tabs for full print */
    body[data-print-scope="all"] [data-tab] { display: block !important; page-break-after: always; }
    table { font-size: 9px !important; }

const WORK_ORDERS_INIT = [
  { id:1, os:"260001", date:"2026-01-20", item:"SPLI", freq:"Mensal", type:"Preventiva", status:"Realizada", parts:"Não", conclusion:"Substituição de peças", notes:"Daikin 2HP cassette AC — dano no painel (Sala de Servidor GF).", disposition:"Apto para serviço", hasIssue:true },
  { id:2, os:"260001", date:"2026-01-20", item:"VC", freq:"Mensal", type:"Preventiva", status:"Realizada", parts:"Não", conclusion:"Agendar próxima preventiva", notes:"", disposition:"Agendar próxima corretiva", hasIssue:false },
  { id:3, os:"260001", date:"2026-01-31", item:"VC", freq:"Mensal", type:"Preventiva", status:"Realizada", parts:"Não", conclusion:"Agendar próxima preventiva", notes:"", disposition:"Agendar próxima preventiva", hasIssue:false },
  { id:4, os:"260002", date:"2026-01-22", item:"TORR", freq:"Mensal", type:"Preventiva", status:"Realizada", parts:"Não", conclusion:"Substituição de peças", notes:"Motor do ventilador da torre solto (Item B-82). Mantas de absorção sonora envelhecidas e sem efeito.", disposition:"Substituição de peças", hasIssue:true },
  { id:5, os:"260003", date:"2026-01-22", item:"BOMB", freq:"Mensal", type:"Preventiva", status:"Realizada", parts:"Não", conclusion:"Agendar próxima preventiva", notes:"Bomba de água de arrefecimento com fissuras no ponto de amortecimento de vibração (Três).", disposition:"Direcionar para descarte", hasIssue:true },

  { id:10, os:"260007", date:"2026-02-28", item:"TORR", freq:"Mensal", type:"Preventiva", status:"Cancelada", parts:"", conclusion:"", notes:"", disposition:"", hasIssue:false },

  { id:13, os:"260010", date:"2026-02-28", item:"BOMB", freq:"Trimestral", type:"Preventiva", status:"Cancelada", parts:"", conclusion:"", notes:"", disposition:"", hasIssue:false },

  { id:15, os:"260012", date:"2026-03-19", item:"SPLI", freq:"Mensal", type:"Preventiva", status:"Realizada", parts:"", conclusion:"", notes:"", disposition:"", hasIssue:false },

  { id:18, os:"260015", date:"2026-03-20", item:"BOMB", freq:"Mensal", type:"Preventiva", status:"Realizada", parts:"", conclusion:"", notes:"", disposition:"", hasIssue:false },
  { id:19, os:"260016", date:"2026-03-20", item:"BOMB", freq:"Mensal", type:"Preventiva", status:"Realizada", parts:"", conclusion:"", notes:"", disposition:"", hasIssue:false },
  { id:20, os:"260017", date:"2026-03-20", item:"TORR", freq:"Mensal", type:"Preventiva", status:"Realizada", parts:"", conclusion:"", notes:"", disposition:"", hasIssue:false },
  { id:21, os:"260015", date:"2026-03-20", item:"BOMB", freq:"Trimestral", type:"Preventiva", status:"Realizada", parts:"", conclusion:"", notes:"", disposition:"", hasIssue:false },
  { id:22, os:"260016", date:"2026-03-20", item:"BOMB", freq:"Trimestral", type:"Preventiva", status:"Realizada", parts:"", conclusion:"", notes:"", disposition:"", hasIssue:false },
  { id:23, os:"260012", date:"2026-03-19", item:"SPLI", freq:"Trimestral", type:"Preventiva", status:"Realizada", parts:"", conclusion:"", notes:"", disposition:"", hasIssue:false },
  { id:24, os:"260013", date:"2026-03-19", item:"VC", freq:"Trimestral", type:"Preventiva", status:"Realizada", parts:"", conclusion:"", notes:"", disposition:"", hasIssue:false },
];

const CORRETIVA_MONITORED = [
  { system: "CHIL", since: "2026-01-22", lastEvent: null, notes: "CHIL2 CP2/CP3 compressor danificado" },
  { system: "BOMB", since: "2026-01-22", lastEvent: null, notes: "Fissuras no amortecimento de vibração" },
  { system: "TORR", since: "2026-01-22", lastEvent: "2026-02-25", notes: "Incidente válvula segurança chiller" },
  { system: "SPLI", since: "2026-01-20", lastEvent: "2026-02-28", notes: "Dano painel AC Daikin" },
  { system: "VC", since: "2026-01-20", lastEvent: null, notes: "" },
];

/* ═══ HELPERS ═══ */
function fmtDate(d) { if(!d) return "—"; const p=d.split("-"); return `${p[2]}/${p[1]}/${p[0]}`; }
function daysBetween(a,b) { return Math.ceil((new Date(b)-new Date(a))/86400000); }
function isPast(d) { return d < TODAY; }
function isThisMonth(d) { return d.substring(0,7) === TODAY.substring(0,7); }

/* ═══ THEME — Excel-faithful light theme ═══ */
const T = {
  bg:"#ffffff", s1:"#f8f9fa", s2:"#f0f1f3", s3:"#e8eaed", brd:"#d0d5dd",
  tx:"#1a1a1a", txM:"#6b7280", txB:"#111111",
  ac:"#2563eb", acL:"#1d4ed8",
  gn:"#92D050", gnDk:"#548235",   // Excel green for completed
  yl:"#FFC000", ylDk:"#BF9000",   // Excel gold/amber
  or:"#ED7D31", orDk:"#C55A11",   // Excel orange for corrective
  rd:"#FF0000", rdDk:"#C00000",   // Excel red for cancelled
  bl:"#4472C4", blDk:"#2F5597",   // Excel blue
  pu:"#7030A0", cy:"#00B0F0",
  hdrGn:"#375623",                // Dark green header bar
  hdrGrey:"#A6A6A6",              // Grey header row
};
const ff = "'Segoe UI', 'Calibri', 'Helvetica Neue', system-ui, sans-serif";

/* ═══ COMPONENTS ═══ */
const Badge = ({children, color, bg}) => (
  <span style={{padding:"2px 8px",borderRadius:4,fontSize:13,fontWeight:700,letterSpacing:0.5,color,background:bg,textTransform:"uppercase",whiteSpace:"nowrap"}}>{children}</span>
);
const Dot = ({color, label}) => (
  <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:13,fontWeight:600,color}}>
    <span style={{width:7,height:7,borderRadius:"50%",background:color,boxShadow:`0 0 6px ${color}50`}}/>{label}
  </span>
);

function App() {
  const [tab, setTab] = useState("painel");
  const [wo, setWo] = useState(WORK_ORDERS_INIT);
  const [fStatus, setFS] = useState("all");
  const [fType, setFT] = useState("all");
  const [fEquip, setFE] = useState("all");
  const [fMonth, setFM] = useState("all");
  const [expanded, setExpanded] = useState(null);
  const [dateEdits, setDateEdits] = useState({});
  const [editing, setEditing] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [editingWo, setEditingWo] = useState(null);
  const [cellStatuses, setCellStatuses] = useState(() => {
    // Pre-populate completed cells from work order data
    const init = {};
    const completedCombos = {};
    WORK_ORDERS_INIT.forEach(w => {
      if(w.status==="Realizada") {
        const mi = parseInt(w.date.split("-")[1])-1;
        const mk = MONTH_KEYS[mi];
        const freq = w.freq === "—" ? null : w.freq;
        if(freq) init[`${w.item}_${freq}_${mk}`] = "completed";
        if(w.type==="Corretiva" && freq) init[`${w.item}_${freq||"Mensal"}_${mk}`] = "corrective";
      }
      if(w.status==="Cancelada") {
        const mi = parseInt(w.date.split("-")[1])-1;
        const mk = MONTH_KEYS[mi];
        const freq = w.freq === "—" ? "Mensal" : w.freq;
        init[`${w.item}_${freq}_${mk}`] = "cancelled";
      }
    });
    return init;
  });

  const setCellStatus = useCallback((cellKey, status) => {
    setCellStatuses(prev => ({...prev, [cellKey]: status}));
    touchLastUpdate();
  },[touchLastUpdate]);
  const [newWo, setNewWo] = useState({os:"",date:"",item:"CHIL",type:"Preventiva",freq:"Mensal",status:"Agendada",notes:""});
  const [lastUpdate, setLastUpdate] = useState(TODAY);
  const [monitoredAssets, setMonitoredAssets] = useState(CORRETIVA_MONITORED);
  const [editingNote, setEditingNote] = useState(null);
  const [showAddAsset, setShowAddAsset] = useState(false);
  const [newAsset, setNewAsset] = useState({system:"",since:TODAY,notes:""});
  const [editingLastUpdate, setEditingLastUpdate] = useState(false);
  const touchLastUpdate = useCallback(() => {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,"0");
    const d = String(now.getDate()).padStart(2,"0");
    setLastUpdate(`${y}-${m}-${d}`);
  }, []);
  const updateAssetNote = useCallback((system, note) => {
    setMonitoredAssets(prev => prev.map(a => a.system===system ? {...a, notes:note} : a));
    touchLastUpdate();
  }, [touchLastUpdate]);
  const addAsset = useCallback(() => {
    if(!newAsset.system.trim()) return;
    setMonitoredAssets(prev => [...prev, {system:newAsset.system.trim().toUpperCase(), since:newAsset.since||TODAY, lastEvent:null, notes:newAsset.notes}]);
    setNewAsset({system:"",since:TODAY,notes:""});
    setShowAddAsset(false);
    touchLastUpdate();
  }, [newAsset, touchLastUpdate]);
  const removeAsset = useCallback((system) => {
    setMonitoredAssets(prev => prev.filter(a => a.system!==system));
    touchLastUpdate();
  }, [touchLastUpdate]);

  /* Stats */
  const stats = useMemo(() => {
    const d=wo.filter(w=>w.status==="Realizada").length, s=wo.filter(w=>w.status==="Agendada").length, can=wo.filter(w=>w.status==="Cancelada").length;
    const p=wo.filter(w=>w.type==="Preventiva").length, c=wo.filter(w=>w.type==="Corretiva").length, pred=wo.filter(w=>w.type==="Preditiva").length;
    const iss=wo.filter(w=>w.hasIssue).length;
    return {total:wo.length,done:d,sched:s,cancel:can,prev:p,corr:c,pred:pred,issues:iss};
  },[wo]);

  const monthStats = useMemo(() => MONTH_FULL.map((m,i) => {
    const items = wo.filter(w=>w.date.split("-")[1]===String(i+1).padStart(2,"0"));
    const active=items.filter(w=>w.status!=="Cancelada"); return {month:m,short:MONTH_KEYS[i],total:active.length,done:items.filter(w=>w.status==="Realizada").length,sched:items.filter(w=>w.status==="Agendada").length,cancel:items.filter(w=>w.status==="Cancelada").length,prev:active.filter(w=>w.type==="Preventiva").length,corr:active.filter(w=>w.type==="Corretiva").length,pred:active.filter(w=>w.type==="Preditiva").length};
  }),[wo]);

  const filtered = useMemo(() => wo.filter(w => {
    if(fStatus!=="all"&&w.status!==fStatus) return false;
    if(fType!=="all"&&w.type!==fType) return false;
    if(fEquip!=="all"&&w.item!==fEquip) return false;
    if(fMonth!=="all") { const mi=MONTH_FULL.indexOf(fMonth); if(parseInt(w.date.split("-")[1])!==mi+1) return false; }
    return true;
  }),[wo,fStatus,fType,fEquip,fMonth]);

  const issues = useMemo(()=>wo.filter(w=>w.hasIssue&&w.notes),[wo]);

  /* PAM with overrides */
  const getPamDays = useCallback((sysId, monthKey, freq) => {
    const key = `${sysId}_${freq}_${monthKey}`;
    if (dateEdits[key]) return dateEdits[key];
    if (freq==="Mensal") return PAM_MENSAL[sysId]?.[monthKey] || [];
    if (freq==="Trimestral") {
      const q = PAM_TRIMESTRAL[sysId];
      if(!q) return [];
      for(const t of ["T1","T2","T3","T4"]) { if(q[t]?.[monthKey]) return q[t][monthKey]; }
      return [];
    }
    if (freq==="Semestral") {
      const s = PAM_SEMESTRAL[sysId];
      if(!s) return [];
      for(const sem of ["S1","S2"]) { if(s[sem]?.[monthKey]) return s[sem][monthKey]; }
      return [];
    }
    return [];
  },[dateEdits]);

  const saveDateEdit = useCallback((sysId, freq, monthKey, newDays) => {
    const key = `${sysId}_${freq}_${monthKey}`;
    setDateEdits(prev => ({...prev, [key]: newDays}));
    setEditing(null);
  },[]);
  const clearCell = useCallback((sysId, freq, monthKey) => {
    const key = `${sysId}_${freq}_${monthKey}`;
    setDateEdits(prev => ({...prev, [key]: []}));
    setCellStatuses(prev => ({...prev, [key]: "pending"}));
    touchLastUpdate();
  },[touchLastUpdate]);

  const addOrder = useCallback(() => {
    if(!newWo.os||!newWo.date) return;
    setWo(prev => [...prev, {...newWo, id:prev.length+1, parts:"", conclusion:"", disposition:"", hasIssue:newWo.type==="Corretiva"}]);
    touchLastUpdate();
    setNewWo({os:"",date:"",item:"CHIL",type:"Preventiva",freq:"Mensal",status:"Agendada",notes:""});
    setShowAdd(false);
  },[newWo]);

  const updateField = useCallback((id, field, value) => {
    setWo(prev => {
      const updated = prev.map(w => w.id===id ? {...w, [field]: value, hasIssue: field==="type" ? value==="Corretiva" : w.hasIssue} : w);
      // Sync notes to monitored asset if the field is "notes"
      if(field==="notes") {
        const wo = updated.find(w=>w.id===id);
        if(wo) updateAssetNote(wo.item, value);
      }
      return updated;
    });
    touchLastUpdate();
  },[touchLastUpdate, updateAssetNote]);

  const startEditWo = useCallback((w) => {
    setEditingWo(w.id);
  },[]);

  const stopEditWo = useCallback(() => {
    setEditingWo(null);
  },[]);

  /* Upcoming from PAM */
  const upcoming = useMemo(() => {
    const items = [];
    const todayMonth = parseInt(TODAY.split("-")[1]);
    const todayDay = parseInt(TODAY.split("-")[2]);
    SYSTEMS.filter(s=>!s.inactive).forEach(sys => {
      ["Mensal","Trimestral","Semestral"].forEach(freq => {
        for(let mi=todayMonth-1; mi<Math.min(todayMonth+1,12); mi++) {
          const mk = MONTH_KEYS[mi];
          const days = getPamDays(sys.id, mk, freq);
          days.forEach(d => {
            const dateStr = `2026-${String(mi+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const diff = daysBetween(TODAY, dateStr);
            if(diff > 0 && diff <= 45) items.push({system:sys.id,name:sys.name,freq,date:dateStr,daysLeft:diff});
          });
        }
      });
    });
    return items.sort((a,b)=>a.date.localeCompare(b.date)).slice(0,10);
  },[getPamDays]);

  const maxBar = Math.max(...monthStats.map(m=>m.total),1);

  /* Donut */
  const Donut = ({data, size=90, thick=12}) => {
    const total = data.reduce((s,d)=>s+d.v,0);
    if(!total) return null;
    const r=(size-thick)/2, circ=2*Math.PI*r;
    let off=0;
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.brd} strokeWidth={thick}/>
        {data.map((d,i) => {
          const dash=circ*d.v/total, gap=circ-dash;
          const el = <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={d.c} strokeWidth={thick} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-off} transform={`rotate(-90 ${size/2} ${size/2})`}/>;
          off+=dash; return el;
        })}
        <text x={size/2} y={size/2-4} textAnchor="middle" fill={T.txB} fontSize="15" fontWeight="800" fontFamily={ff}>{total}</text>

  const card = (lbl,val,color,sub) => (

      <div style={{padding:"16px 16px"}}>

      {/* ═══ PAINEL GERAL ═══ */}
      {tab==="painel"&&<div data-tab="painel">

          <div><div style={{fontSize:13,color:T.txM,marginBottom:3}}>Frequência</div><select value={newWo.freq} onChange={e=>setNewWo(p=>({...p,freq:e.target.value}))} style={inputSt}><option>Mensal</option><option>Trimestral</option><option>Semestral</option><option>—</option></select></div>
          <div><div style={{fontSize:13,color:T.txM,marginBottom:3}}>Estado</div><select value={newWo.status} onChange={e=>setNewWo(p=>({...p,status:e.target.value}))} style={inputSt}><option>Agendada</option><option>Realizada</option><option>Cancelada</option></select></div>
          <button onClick={addOrder} style={{padding:"6px 14px",borderRadius:5,border:"none",background:T.gn,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:ff,height:30}}>Guardar</button>
        </div>}

        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 3px",fontSize:11}}>
            <thead><tr>

            <tbody>{filtered.map((w,i)=>{

                  {isEd?<input type="date" value={w.date} onChange={e=>updateField(w.id,"date",e.target.value)} style={{...edSt,width:120}}/>:fmtDate(w.date)}
                </td>
                <td style={{padding:"8px 10px",fontWeight:600,color:T.tx}}>
                  {isEd?<select value={w.item} onChange={e=>updateField(w.id,"item",e.target.value)} style={edSt}>{SYSTEMS.map(s=><option key={s.id} value={s.id}>{s.id}</option>)}</select>:w.item}

                <td style={{padding:"8px 10px"}}>
                  {isEd?<select value={w.status} onChange={e=>updateField(w.id,"status",e.target.value)} style={edSt}><option>Agendada</option><option>Realizada</option><option>Cancelada</option></select>:<Dot color={w.status==="Realizada"?T.gn:w.status==="Cancelada"?"#E05470":T.yl} label={w.status}/>}

           desc:"Medição de parâmetros operacionais, inspeções de segurança, verificações de vazamentos, ruídos, vibrações e isolamento térmico, limpeza básica e registo nas fichas de manutenção.",

           systems: SYSTEMS},
          {freq:"Trimestral", label:"ACTIVIDADES TRIMESTRAIS 季度活動", labelZh:"季度活動",
           desc:"Purga e limpeza de strainers, limpeza profunda de filtros e verificação de drenos. Registo nas fichas de manutenção.",
           descZh:"清洗和清理過濾器，深度清潔濾網，並檢查排水管道。記錄在維護日誌中。",
           systems: SYSTEMS.filter(s=>["BOMB","SPLI","VC","UTA"].includes(s.id))},
          {freq:"Semestral", label:"ACTIVIDADES SEMESTRAIS 半年活動", labelZh:"半年活動",
           desc:"Lubrificação, verificação de fixações, limpeza de coils, inspeção de componentes e registro de observações (além das mensais).",
           descZh:"潤滑、檢查緊固件、清潔線圈、檢查零件、記錄觀察結果（除每月一次的觀察外）。",
           systems: SYSTEMS},

          const periodHeaders = section.freq==="Trimestral" ? [

            {label:"TRIMESTRE 4 第四季",span:3,months:["Out","Nov","Dez"]},

          return (
            <div key={section.freq} style={{marginBottom:24}}>
              <div style={{fontSize:13,fontWeight:800,color:"#fff",textTransform:"uppercase",letterSpacing:0.8,marginBottom:8,padding:"6px 12px",background:"#808080",borderRadius:2}}>{section.label}</div>

              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                  {/* Period header row (Trimestre/Semestre) */}
                  {periodHeaders && <thead><tr>
                    <th colSpan={3} style={{background:"#D9D9D9"}}/>
                    {periodHeaders.map((ph,pi) => <th key={pi} colSpan={ph.span} style={{textAlign:"center",padding:"6px 4px",fontSize:13,fontWeight:700,color:"#333",background:"#D9D9D9",borderLeft:`1px solid #bbb`,letterSpacing:0.5}}>{ph.label}</th>)}
                  </tr></thead>}
                  <thead><tr>
                    <th style={{textAlign:"left",padding:"7px 8px",color:"#333",fontSize:13,fontWeight:700,borderBottom:`2px solid #999`,minWidth:80,position:"sticky",left:0,background:"#D9D9D9",zIndex:2}}>Grupo<br/><span style={{fontWeight:400,fontSize:8}}>團體</span></th>
                    <th style={{textAlign:"left",padding:"7px 8px",color:"#333",fontSize:13,fontWeight:700,borderBottom:`2px solid #999`,minWidth:90,position:"sticky",left:80,background:"#D9D9D9",zIndex:2}}>Sistema<br/><span style={{fontWeight:400,fontSize:8}}>系統</span></th>
                    <th style={{textAlign:"left",padding:"7px 8px",color:"#333",fontSize:13,fontWeight:700,borderBottom:`2px solid #999`,minWidth:140,maxWidth:180,position:"sticky",left:170,background:"#D9D9D9",zIndex:2}}>Descrição Geral das<br/>Actividades Principais<br/><span style={{fontWeight:400,fontSize:7}}>主要活動概況</span></th>
                    {MONTH_KEYS.map(m=><th key={m} style={{textAlign:"center",padding:"7px 4px",color:"#333",fontSize:13,fontWeight:700,borderBottom:`2px solid #999`,background:"#D9D9D9",minWidth:58}}>{m} 26</th>)}
                  </tr></thead>
                  <tbody>
                    {section.systems.map((sys,si) => {
                      const isFirst = si===0;
                      const groupRowSpan = isFirst ? section.systems.length : 0;

                      return (
                        <tr key={`${sys.id}-${section.freq}`}>
                          {isFirst && <td rowSpan={groupRowSpan} style={{padding:"6px 8px",fontWeight:600,color:T.txM,fontSize:13,lineHeight:1.4,borderBottom:`1px solid ${T.brd}`,verticalAlign:"top",position:"sticky",left:0,background:"#fff",zIndex:1,borderRight:`1px solid ${T.brd}`}}>
                            Instalações de Aquecimento Ventilação e Ar Condicionado (AVAC)<br/><span style={{fontSize:13,color:T.txM}}>暖氣、通風和空調（HVAC）安裝</span>
                          </td>}
                          <td style={{padding:"6px 8px",fontWeight:700,color:T.txB,fontSize:13,borderBottom:`1px solid ${T.brd}`,position:"sticky",left:80,background:"#fff",zIndex:1,borderRight:`1px solid ${T.brd}`}}>
                            {sys.name}<br/><span style={{fontSize:13,color:T.txM,fontWeight:400}}>{sys.nameZh}</span>
                          </td>
                          {isFirst && <td rowSpan={groupRowSpan} style={{padding:"6px 8px",fontSize:13,color:T.txM,lineHeight:1.5,borderBottom:`1px solid ${T.brd}`,verticalAlign:"top",position:"sticky",left:170,background:"#fff",zIndex:1,borderRight:`1px solid ${T.brd}`,maxWidth:180}}>
                            <div style={{textAlign:"center"}}>{section.desc}</div><div style={{textAlign:"center",color:`${T.txM}90`}}>{section.descZh}</div>
                          </td>}
                          {MONTH_KEYS.map(mk => {
                            if(sys.inactive) return <td key={mk} style={{textAlign:"center",padding:"4px",color:T.txM,fontSize:13,background:"#fff",borderBottom:`1px solid ${T.brd}`,borderLeft:`1px solid ${T.brd}`}}>(2)</td>;

                            const days = getPamDays(sys.id, mk, section.freq);
                            const cellKey = `${sys.id}_${section.freq}_${mk}`;
                            const cellStatus = cellStatuses[cellKey] || "pending";
                            const isEditingDays = editing === cellKey;
                            const isCurrent = mk === MONTH_KEYS[parseInt(TODAY.split("-")[1])-1];

                            const hasScheduledDays = days.length > 0;
                            const bgMap = {
                              completed: "#92D050",
                              corrective: "#ED7D31",
                              predictive: "#7030A0",
                              cancelled: "#FFE0B2",
                              pending: "#fff",
                            };
                            const colorMap = {
                              completed: "#1a1a1a",
                              corrective: "#fff",
                              predictive: "#fff",
                              cancelled: "#C00000",
                              pending: "#1a1a1a",
                            };
                            // Empty cells (no scheduled days) are always white
                            const cellBg = hasScheduledDays ? bgMap[cellStatus] : "#fff";

                            return (
                              <td key={mk} style={{textAlign:"center",padding:"3px 2px",background:cellBg,borderBottom:`1px solid ${T.brd}`,borderLeft:`1px solid ${T.brd}`,position:"relative",minHeight:28,verticalAlign:"middle"}}>
                                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                                  {days.length > 0 && (isEditingDays ? (
                                    <input autoFocus defaultValue={days.join(",")}
                                      onBlur={e=>{const v=e.target.value.split(",").map(Number).filter(n=>n>0&&n<32);saveDateEdit(sys.id,section.freq,mk,v);}}
                                      onKeyDown={e=>{if(e.key==="Enter"){const v=e.target.value.split(",").map(Number).filter(n=>n>0&&n<32);saveDateEdit(sys.id,section.freq,mk,v);}if(e.key==="Escape")setEditing(null);}}
                                      style={{width:42,padding:"2px 3px",border:`1px solid ${T.ac}`,borderRadius:3,background:"#f8f9fa",color:T.txB,fontSize:13,textAlign:"center",fontFamily:ff}}
                                    />
                                  ) : (
                                    <span onClick={()=>setEditing(cellKey)} style={{fontWeight:700,color:colorMap[cellStatus],fontSize:13,cursor:"pointer"}}
                                      title="Clique para editar dias">{days.join(", ")}</span>
                                  ))}
                                  {!isEditingDays && (
                                    <div style={{display:"flex",gap:1}}>
                                      {[
                                        {st:"completed",icon:"✓",c:T.gn,tip:"Concluída"},
                                        {st:"corrective",icon:"⚡",c:T.or,tip:"Corretiva"},
                                        {st:"predictive",icon:"◆",c:T.pu,tip:"Preditiva"},
                                        {st:"cancelled",icon:"✕",c:T.rd,tip:"Cancelada"},
                                        {st:"pending",icon:"○",c:T.txM,tip:"Pendente"},
                                      ].map(btn => (
                                        <button key={btn.st} onClick={(e)=>{e.stopPropagation();setCellStatus(cellKey,cellStatus===btn.st?"pending":btn.st);}}
                                          title={btn.tip}
                                          style={{
                                            width:16,height:14,padding:0,border:"none",borderRadius:2,cursor:"pointer",fontSize:13,fontWeight:700,
                                            background:cellStatus===btn.st?`${btn.c}40`:"transparent",
                                            color:cellStatus===btn.st?btn.c:`${T.txM}60`,
                                            fontFamily:ff,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",
                                          }}>{btn.icon}</button>
                                      ))}
                                      <button onClick={(e)=>{e.stopPropagation();clearCell(sys.id,section.freq,mk);}}
                                        title="Limpar célula (branco)"
                                        style={{width:16,height:14,padding:0,border:"none",borderRadius:2,cursor:"pointer",fontSize:9,fontWeight:700,background:"transparent",color:`${T.rd}80`,fontFamily:ff,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>🗑</button>
                                    </div>
                                  )}
                                </div>
                                {dateEdits[cellKey] && !isEditingDays && <span style={{position:"absolute",top:0,left:1,fontSize:6,color:T.pu}}>✎</span>}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              {/* Legend */}
              <div style={{display:"flex",gap:14,marginTop:8,flexWrap:"wrap"}}>
                {[
                  [T.gn,"✓","Actividades concluídas"],
                  [T.or,"⚡","Manutenção corretiva"],
                  [T.pu,"◆","Manutenção preditiva"],
                  [T.rd,"✕","Cancelada"],
                  [T.yl,"","Mês actual"],
                ].map(([c,icon,l])=><span key={l} style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:4}}>
                  <span style={{width:8,height:8,borderRadius:2,background:`${c}40`,border:`1px solid ${c}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,color:c,fontWeight:700}}>{icon}</span>{l}
                </span>)}
              </div>
            </div>
          );
        })}
        <div style={{background:"#f0f1f3",borderRadius:6,padding:12,fontSize:13,color:T.txM,lineHeight:1.7,marginTop:4}}>
          <b>(1)</b> Sempre que possível, as rotinas de manutenção serão agendadas na 3ª semana de cada mês, salvo excepção do ano novo chinês (2026) e outros feriados.<br/>
          <b>(2)</b> As unidades de tratamento de ar existentes (UTA) estão não operacionais e consideradas para substituição no futuro plano de remodelação das infraestruturas do Consulado.<br/>
          <span style={{color:T.gn}}>■</span> Actividades concluídas &nbsp;&nbsp; <span style={{color:T.or}}>■</span> Actividades de manutenção corretiva
        </div>
      </div>}

      {/* ═══ ATIVOS MONITORADOS ═══ */}
      {tab==="ativos"&&<div data-tab="ativos">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:800,color:T.txB,textTransform:"uppercase",letterSpacing:1}}>Ativos sob Monitorização Corretiva</div>
          <button onClick={()=>setShowAddAsset(v=>!v)} data-no-print
            style={{padding:"5px 12px",borderRadius:4,border:`1px solid ${T.gn}`,background:showAddAsset?"#f0f0f0":T.gn,color:showAddAsset?"#333":"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:ff}}>
            {showAddAsset?"✕ Cancelar":"+ Novo Equipamento"}
          </button>
        </div>
        {showAddAsset&&<div data-no-print style={{background:"#fff",borderRadius:6,border:`1px solid ${T.brd}`,padding:14,marginBottom:14,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
          <div style={{flex:"1 1 120px"}}>
            <div style={{fontSize:13,color:T.txM,marginBottom:3}}>Código / ID</div>
            <input value={newAsset.system} onChange={e=>setNewAsset(p=>({...p,system:e.target.value}))}
              placeholder="ex: UTA, BOMB2..." list="system-options"
              style={{...inputSt,width:"100%"}}/>
            <datalist id="system-options">
              {SYSTEMS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </datalist>
          </div>
          <div style={{flex:"1 1 120px"}}>
            <div style={{fontSize:13,color:T.txM,marginBottom:3}}>Data de início</div>
            <input type="date" value={newAsset.since} onChange={e=>setNewAsset(p=>({...p,since:e.target.value}))} style={{...inputSt,width:"100%"}}/>
          </div>
          <div style={{flex:"2 1 200px"}}>
            <div style={{fontSize:13,color:T.txM,marginBottom:3}}>Observação inicial</div>
            <input value={newAsset.notes} onChange={e=>setNewAsset(p=>({...p,notes:e.target.value}))}
              placeholder="Opcional..." style={{...inputSt,width:"100%"}}/>
          </div>
          <button onClick={addAsset}
            style={{padding:"7px 16px",borderRadius:4,border:"none",background:T.gn,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:ff,height:34}}>Guardar</button>
        </div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
          {monitoredAssets.map((a,i) => {
            const sys = SYSTEMS.find(s=>s.id===a.system);
            const daysSince = daysBetween(a.since, TODAY);
            const hasEvent = !!a.lastEvent;
            const isEditingThisNote = editingNote === a.system;
            return (
              <div key={i} style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${hasEvent?`${T.or}50`:T.brd}`,padding:16,display:"flex",flexDirection:"column"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:12}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:800,color:T.txB}}>{a.system}</div>
                    <div style={{fontSize:13,color:T.txM}}>{sys?.name||a.system}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <Badge color={hasEvent?T.or:T.gn} bg={hasEvent?`${T.or}18`:`${T.gn}18`}>{hasEvent?"Com ocorrência":"Monitorado"}</Badge>
                    <button onClick={()=>removeAsset(a.system)} title="Remover ativo"
                      style={{padding:"2px 6px",border:`1px solid ${T.brd}`,borderRadius:3,background:"#fff",color:T.rd,fontSize:11,cursor:"pointer",fontFamily:ff,flexShrink:0}}>✕</button>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,flex:1}}>
                  <div style={{background:"#f8f9fa",borderRadius:5,padding:"7px 9px"}}><div style={{fontSize:13,color:T.txM,textTransform:"uppercase",letterSpacing:0.5}}>Desde</div><div style={{fontSize:13,fontWeight:700,color:T.tx}}>{fmtDate(a.since)}</div></div>
                  <div style={{background:"#f8f9fa",borderRadius:5,padding:"7px 9px"}}><div style={{fontSize:13,color:T.txM,textTransform:"uppercase",letterSpacing:0.5}}>Dias em monit.</div><div style={{fontSize:13,fontWeight:700,color:T.ac}}>{daysSince}</div></div>
                  <div style={{background:"#f8f9fa",borderRadius:5,padding:"7px 9px"}}><div style={{fontSize:13,color:T.txM,textTransform:"uppercase",letterSpacing:0.5}}>Última ocorrência</div><div style={{fontSize:13,fontWeight:700,color:hasEvent?T.or:T.txM}}>{a.lastEvent?fmtDate(a.lastEvent):"Nenhuma"}</div></div>
                  <div style={{background:"#f8f9fa",borderRadius:5,padding:"7px 9px"}}><div style={{fontSize:13,color:T.txM,textTransform:"uppercase",letterSpacing:0.5}}>Estado</div><Dot color={hasEvent?T.or:T.gn} label={hasEvent?"Activo":"Estável"}/></div>
                </div>
                <div style={{marginTop:12}}>
                  {isEditingThisNote
                    ? <div style={{display:"flex",gap:4}}>
                        <input autoFocus defaultValue={a.notes}
                          id={`note-input-${a.system}`}
                          style={{flex:1,fontSize:13,padding:"5px 7px",border:`1px solid ${T.brd}`,borderRadius:4,color:T.tx,background:"#fff"}}
                          onKeyDown={e=>{
                            if(e.key==="Enter"){updateAssetNote(a.system,e.target.value);setEditingNote(null);}
                            if(e.key==="Escape"){setEditingNote(null);}
                          }}
                        />
                        <button onClick={()=>{const v=document.getElementById(`note-input-${a.system}`).value;updateAssetNote(a.system,v);setEditingNote(null);}}
                          style={{padding:"5px 9px",borderRadius:4,border:"none",background:T.gn,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>✓</button>
                        <button onClick={()=>setEditingNote(null)}
                          style={{padding:"5px 9px",borderRadius:4,border:`1px solid ${T.brd}`,background:"#fff",color:T.txM,fontSize:13,cursor:"pointer"}}>✕</button>
                      </div>
                    : <div style={{display:"flex",alignItems:"flex-start",gap:4}}>
                        {a.notes
                          ? <div style={{flex:1,fontSize:13,color:T.txM,padding:"5px 7px",background:"#f8f9fa",borderRadius:4,borderLeft:`2px solid ${T.or}`,cursor:"pointer"}}
                              onClick={()=>setEditingNote(a.system)}
                              title="Clique para editar">{a.notes}</div>
                          : <button onClick={()=>setEditingNote(a.system)}
                              style={{flex:1,fontSize:13,color:T.txM,padding:"5px 7px",background:"#f8f9fa",borderRadius:4,border:`1px dashed ${T.brd}`,cursor:"pointer",textAlign:"left"}}>+ Adicionar observação</button>
                        }
                        {a.notes&&<button onClick={()=>updateAssetNote(a.system,"")}
                          style={{padding:"4px 7px",borderRadius:4,border:`1px solid ${T.brd}`,background:"#fff",color:T.rd,fontSize:12,cursor:"pointer",flexShrink:0}} title="Remover observação">✕</button>}
                      </div>
                  }
                </div>
              </div>
            );
          })}
        </div>
      </div>}

      {/* ═══ ANÁLISE ═══ */}
      {tab==="analise"&&<div data-tab="analise">
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14}}>
          {/* Volume por Tipo */}
          <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:12}}>Volume por Tipo</div>
            <Donut data={[{v:stats.prev,c:T.bl},{v:stats.corr,c:T.or},{v:stats.pred,c:T.pu}]}/>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:10}}>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.bl}}/>Preventiva ({stats.prev})</span>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.or}}/>Corretiva ({stats.corr})</span>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.pu}}/>Preditiva ({stats.pred})</span>
            </div>
          </div>
          {/* Estado de Manutenção */}
          <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:12}}>Estado de Manutenção</div>
            <Donut data={[{v:stats.done,c:T.gn},{v:stats.sched,c:T.yl},{v:stats.cancel,c:T.rd}]}/>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:10}}>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.gn}}/>Realizada ({stats.done})</span>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.yl}}/>Agendada ({stats.sched})</span>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.rd}}/>Cancelada ({stats.cancel})</span>
            </div>
          </div>
          {/* Conclusão após Manutenção */}
          <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:12}}>Conclusão após Manutenção</div>
            {(()=>{
              const agendar=wo.filter(w=>w.conclusion?.includes("Agendar")).length;
              const apto=wo.filter(w=>w.conclusion?.includes("Apto")||w.disposition?.includes("Apto")).length;
              const descarte=wo.filter(w=>w.disposition?.toLowerCase().includes("descarte")).length;
              const subst=wo.filter(w=>w.conclusion?.includes("Substituição")).length;
              return <>
                <Donut data={[{v:agendar,c:T.bl},{v:apto,c:T.gn},{v:descarte,c:T.rd},{v:subst,c:T.or}]}/>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginTop:10}}>
                  <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:2}}><span style={{width:5,height:5,borderRadius:1,background:T.bl}}/>Agendar ({agendar})</span>
                  <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:2}}><span style={{width:5,height:5,borderRadius:1,background:T.gn}}/>Apto ({apto})</span>
                  <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:2}}><span style={{width:5,height:5,borderRadius:1,background:T.rd}}/>Descarte ({descarte})</span>
                  <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:2}}><span style={{width:5,height:5,borderRadius:1,background:T.or}}/>Subst. peças ({subst})</span>
                </div>
              </>;
            })()}
          </div>
          {/* Troca de Peças */}
          <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:12}}>Necessário Troca de Peças</div>
            <Donut data={[{v:stats.partsNo||wo.filter(w=>w.parts==="Não").length,c:T.bl},{v:stats.partsYes||wo.filter(w=>w.parts==="Sim").length,c:T.or}]}/>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:10}}>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.bl}}/>Não</span>
              <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:T.or}}/>Sim</span>
            </div>
          </div>
        </div>

        {/* Resumo Mensal Table */}
        <div style={{background:"#fff",borderRadius:6,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",border:`1px solid ${T.brd}`,padding:16,marginTop:16}}>
          <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:10}}>Resumo e Previsões — 2026</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead><tr>
                <th style={{textAlign:"left",padding:"5px 8px",color:T.txM,fontSize:13,borderBottom:`1px solid ${T.brd}`}}>Tipo</th>
                {MONTH_KEYS.map(m=><th key={m} style={{textAlign:"center",padding:"5px 4px",color:T.txM,fontSize:13,borderBottom:`1px solid ${T.brd}`}}>{m}</th>)}
                <th style={{textAlign:"center",padding:"5px 6px",color:T.txB,fontSize:13,fontWeight:800,borderBottom:`1px solid ${T.brd}`}}>Total</th>
              </tr></thead>
              <tbody>
                {[["Total de Actividades","total",T.txB],["Preventiva","prev",T.bl],["Corretiva","corr",T.or],["Preditiva","pred",T.pu]].map(([label,key,color])=>(
                  <tr key={key}>
                    <td style={{padding:"5px 8px",fontWeight:600,color,borderBottom:`1px solid ${T.brd}`}}>{label}</td>
                    {monthStats.map((m,i)=><td key={i} style={{textAlign:"center",padding:"5px 4px",color:m[key]>0?color:T.txM,fontWeight:m[key]>0?700:400,borderBottom:`1px solid ${T.brd}`}}>{m[key]}</td>)}
                    <td style={{textAlign:"center",padding:"5px 6px",fontWeight:800,color,borderBottom:`1px solid ${T.brd}`}}>{monthStats.reduce((s,m)=>s+m[key],0)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>}

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
