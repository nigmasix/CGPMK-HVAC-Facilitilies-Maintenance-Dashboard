/* ── localStorage persistence ── */
const STORAGE_KEY = "cgpmhk_maint_2026_v5";
// Clear old storage keys if present
try { ["cgpmhk_maint_2026","cgpmhk_maint_2026_v2","cgpmhk_maint_2026_v3","cgpmhk_maint_2026_v4"].forEach(k=>{if(localStorage.getItem(k))localStorage.removeItem(k);}); } catch(e) {}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function usePersistedState(key, defaultVal) {
  const saved = useRef(loadState());
  const [val, setVal] = useState(() => {
    if(!saved.current || saved.current[key] === undefined) return defaultVal;
    const v = saved.current[key];
    // Protect: if default is a non-empty array but saved is empty, use default
    if(Array.isArray(defaultVal) && defaultVal.length > 0 && Array.isArray(v) && v.length === 0) return defaultVal;
    return v;
  });
  return [val, setVal];
}

/* ── ExpandingNotes — top-level component (must not be inside App) ── */
function ExpandingNotes({value, onChange, placeholder="—", style={}}) {
  const [focused, setFocused] = React.useState(false);
  const [isDark, setIsDark] = React.useState(()=>document.body.dataset.dark==="1");
  const ref = React.useRef(null);
  React.useEffect(()=>{
    if(focused && ref.current) {
      ref.current.style.height="auto";
      ref.current.style.height=Math.max(ref.current.scrollHeight,80)+"px";
    }
  }, [focused, value]);
  React.useEffect(()=>{
    const obs = new MutationObserver(()=>setIsDark(document.body.dataset.dark==="1"));
    obs.observe(document.body, {attributes:true, attributeFilter:["data-dark"]});
    return ()=>obs.disconnect();
  }, []);
  const bg = isDark?"#2a2a2a":"#fff";
  const clr = isDark?"#e8eaed":"#1a1a1a";
  const brd = focused?(isDark?"#4d8ef0":"#2563eb"):(isDark?"#444":"#d0d5dd");
  return (
    <textarea
      ref={ref}
      value={value||""}
      onChange={e=>onChange(e.target.value)}
      placeholder={placeholder}
      onFocus={()=>setFocused(true)}
      onBlur={()=>setFocused(false)}
      rows={focused?undefined:1}
      style={{
        width:"100%",
        fontFamily:"'Segoe UI','Calibri','Helvetica Neue',system-ui,sans-serif",
        fontSize:13, color:clr,
        border:`1px solid ${brd}`,
        borderRadius:4, padding:"4px 7px",
        resize:"none", outline:"none",
        lineHeight:1.5, boxSizing:"border-box",
        background:bg,
        overflow: focused?"auto":"hidden",
        height: focused?"auto":"24px",
        transition:"height 0.15s, border-color 0.15s",
        boxShadow: focused?`0 0 0 2px ${isDark?"#4d8ef044":"#2563eb22"}`:"none",
        ...style
      }}
    />
  );
}

function DraggableAIButton({apiKey,apiProvider,customEndpoint,customModel,providerModels,setTempProvider,setTempKey,setTempEndpoint,setTempModel,setTempModels,setShowKeyPrompt,setShowChat,writeMode,wo,assetRegistry}) {
  const BTN = 58;
  const POS_KEY = "cgpmhk_ai_btn_pos";

  const [pos, setPos] = React.useState(null); // null = not yet positioned

  React.useEffect(()=>{
    try {
      const p = JSON.parse(localStorage.getItem(POS_KEY));
      if(p && typeof p.x === "number") { setPos(p); return; }
    } catch(e){}
    setPos({x: window.innerWidth - BTN - 24, y: window.innerHeight - BTN - 24});
  }, []);

  const hasMoved = React.useRef(false);
  const origin   = React.useRef({mx:0, my:0, bx:0, by:0});
  const livePos  = React.useRef({x:0, y:0});

  React.useEffect(()=>{ if(pos) livePos.current = pos; }, [pos]);

  const overdueCount = assetRegistry.filter(a=>{
    const last = wo.filter(w=>w.item===a.code&&w.status==="Realizada")
                   .sort((x,y)=>y.date.localeCompare(x.date))[0]?.date;
    return last && Math.round((new Date(TODAY)-new Date(last))/(864e5)) > 35;
  }).length;

  const onPointerDown = (e) => {
    e.preventDefault();
    hasMoved.current = false;
    origin.current = {mx:e.clientX, my:e.clientY, bx:livePos.current.x, by:livePos.current.y};

    const onMove = (e2) => {
      const dx = e2.clientX - origin.current.mx;
      const dy = e2.clientY - origin.current.my;
      if(!hasMoved.current && Math.abs(dx)<5 && Math.abs(dy)<5) return;
      hasMoved.current = true;
      const nx = Math.max(8, Math.min(window.innerWidth  - BTN - 8, origin.current.bx + dx));
      const ny = Math.max(8, Math.min(window.innerHeight - BTN - 8, origin.current.by + dy));
      livePos.current = {x:nx, y:ny};
      const el = document.getElementById("ai-fab");
      if(el){ el.style.left = nx+"px"; el.style.top = ny+"px"; }
    };

    const onUp = () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      if(!hasMoved.current) return;
      const p = livePos.current;
      setPos(p);
      try { localStorage.setItem(POS_KEY, JSON.stringify(p)); } catch(e){}
    };

    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  };

  const handleClick = () => {
    if(hasMoved.current) return;
    if(!apiKey){
      setTempProvider(apiProvider); setTempKey(""); setTempEndpoint(customEndpoint);
      setTempModel(customModel); setTempModels({...providerModels}); setShowKeyPrompt(true);
    } else {
      setShowChat(p=>!p);
    }
  };

  if(!pos) return null; // wait for useEffect to set position

  return (
    <button id="ai-fab" data-no-print
      onPointerDown={onPointerDown}
      onClick={handleClick}
      title="Gestor de Manutenção IA — arrasta para mover"
      style={{
        position:"fixed", left:pos.x, top:pos.y,
        width:BTN, height:BTN, borderRadius:"50%",
        border:"none", background:"#3a3a3a",
        boxShadow:"0 3px 14px rgba(0,0,0,0.3)",
        cursor:"grab", zIndex:9997,
        display:"flex", alignItems:"center", justifyContent:"center",
        touchAction:"none", userSelect:"none", fontFamily:"inherit",
      }}
      onMouseEnter={e=>e.currentTarget.style.background="#222"}
      onMouseLeave={e=>e.currentTarget.style.background="#3a3a3a"}
    >
      <span style={{fontSize:31,lineHeight:1,pointerEvents:"none"}}>👨‍🔧</span>
      {writeMode&&<div style={{position:"absolute",top:2,right:2,width:12,height:12,borderRadius:"50%",background:"#92D050",border:"2px solid #fff",pointerEvents:"none"}}/>}
      {!writeMode&&overdueCount>0&&<div style={{position:"absolute",top:2,right:2,minWidth:16,height:16,borderRadius:8,background:"#E05470",border:"2px solid #fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#fff",padding:"0 3px",pointerEvents:"none"}}>{overdueCount}</div>}
    </button>
  );
}

          </div>
          <div style={{width:20,flexShrink:0}}/>
          <div style={{textAlign:"center",flex:1,padding:"12px 24px",background:"#808080",borderRadius:4}}>

            {projectConfig.clientSubtitle&&<p style={{margin:"4px 0 0",fontSize:16,color:"#e0e0e0",fontFamily:"SimSun,STSong,serif",fontWeight:700}}>{projectConfig.clientSubtitle}</p>}

      <div style={{background:"#808080",color:"#fff",padding:"7px 16px",marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:15,fontWeight:700,letterSpacing:0.5}}>{projectConfig.planTitle}</span>
        <span style={{fontSize:15,display:"flex",alignItems:"center",gap:4}}>
          Última actualização: &nbsp;
          {editingLastUpdate
            ? <input type="date" autoFocus value={lastUpdate} onChange={e=>setLastUpdate(e.target.value)} onBlur={()=>setEditingLastUpdate(false)} onKeyDown={e=>{if(e.key==="Enter"||e.key==="Escape")setEditingLastUpdate(false);}} style={{fontSize:15,padding:"1px 4px",border:"1px solid #fff8",borderRadius:3,background:"rgba(255,255,255,0.15)",color:"#fff",outline:"none",width:120}}/>
            : <span onClick={()=>setEditingLastUpdate(true)} style={{cursor:"pointer",textDecoration:"underline dotted",opacity:0.9,fontWeight:700}}>{fmtDate(lastUpdate)}</span>
          }
        </span>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.bg,padding:"0 16px",borderBottom:`1px solid ${T.brd}`}} data-no-print>
        <div style={{display:"flex",gap:2,flexWrap:"nowrap",overflowX:"auto"}}>{[["inventario","Ativos"],["painel","Painel"],["os","Ordens de Serviço"],["plano","Plano Anual"],["ativos","Monitorização"],["analise","Análise I"],["analise2","Análise II"]].map(([id,l])=>tabBtn(id,l))}</div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {undoLabel&&<button onClick={undo} style={{padding:"6px 12px",border:`1px solid ${T.or}`,borderRadius:4,background:`${T.or}15`,color:T.or,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:ff}}>↩ Desfazer: {undoLabel}</button>}
          <button onClick={()=>setShowProjectConfig(true)} title="Configuração do projecto"
            style={{...btnEd,padding:"5px 8px",fontSize:14}}>⚙️</button>
          <button onClick={()=>setDarkMode(d=>!d)} title={darkMode?"Modo claro":"Modo escuro"}
            style={{padding:"5px 8px",border:`1px solid ${T.brd}`,borderRadius:4,background:T.s1,color:T.tx,fontSize:14,cursor:"pointer",fontFamily:ff,lineHeight:1}}>
            {darkMode?"☀️":"🌙"}
          </button>
          <button onClick={()=>handlePrint(tab)} style={{padding:"5px 9px",border:`1px solid ${T.brd}`,borderRadius:4,background:T.bg,color:T.tx,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:ff}}>🖨 Tab</button>
          <button onClick={()=>handlePrint("all")} style={{padding:"5px 9px",border:`1px solid ${T.hdrGn}`,borderRadius:4,background:T.hdrGn,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:ff}}>🖨 Tudo</button>
          <button onClick={()=>setShowReport(true)} style={{padding:"5px 9px",border:`1px solid ${T.pu}`,borderRadius:4,background:T.pu,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:ff}}>📋 Relatório</button>
          <button onClick={()=>{
            const data = { wo, dateEdits, cellStatuses, cellCustomColors, cellCustomText, lastUpdate, monitoredAssets, assetRegistry, equipCondition, equipNotes, footerNotes, projectConfig, _exportDate:new Date().toISOString(), _version:STORAGE_KEY };
            const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = `CGPMHK_backup_${TODAY.replace(/-/g,"")}.json`; a.click();
            URL.revokeObjectURL(url);
          }} style={{padding:"5px 9px",border:`1px solid ${T.ac}`,borderRadius:4,background:T.ac,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:ff}}>⬇ Exportar</button>
          <button onClick={()=>{
            const input = document.createElement("input");
            input.type = "file"; input.accept = ".json";
            input.onchange = (ev) => {
              const file = ev.target.files[0]; if(!file) return;
              const reader = new FileReader();
              reader.onload = (e) => {
                try {
                  const data = JSON.parse(e.target.result);
                  if(!data.wo || !data.assetRegistry) { alert("Ficheiro inválido — não contém dados do dashboard."); return; }
                  if(!confirm(`Importar backup de ${data._exportDate ? new Date(data._exportDate).toLocaleString("pt") : "data desconhecida"}?\n\nTodos os dados actuais serão substituídos.`)) return;
                  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                  location.reload();
                } catch(err) { alert("Erro ao ler ficheiro: " + err.message); }
              };
              reader.readAsText(file);
            };
            input.click();
          }} style={{padding:"5px 9px",border:`1px solid ${T.ac}`,borderRadius:4,background:"transparent",color:T.ac,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:ff}}>⬆ Importar</button>
          <button onClick={()=>{if(confirm("Repor todos os dados iniciais? As alterações guardadas serão perdidas.")){localStorage.removeItem(STORAGE_KEY);location.reload();}}} style={{padding:"5px 9px",border:`1px solid ${T.rd}`,borderRadius:4,background:"transparent",color:T.rd,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:ff}}>⟲ Repor</button>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:T.gn,display:"inline-block",boxShadow:`0 0 4px ${T.gn}`}}/>
          <span style={{fontSize:11,color:T.txM,fontWeight:600}}>Sincronizado · última actualização: {fmtDate(lastUpdate)}</span>
        </div>
        <span style={{fontSize:11,color:T.txM}}>{projectConfig.clientName} · {projectConfig.planYear}</span>
      </div>

      {/* Print footer — only visible on print */}
      <div className="print-footer" style={{display:"none"}}>
        <span>{projectConfig.clientName} — {projectConfig.planTitle} · {projectConfig.providerName}</span>
        <span>Impresso em {fmtDate(TODAY)}</span>
      </div>

      <div style={{padding:"16px"}}>

      {tab==="inventario"&&<div data-tab="inventario">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:800,color:T.txB,textTransform:"uppercase",letterSpacing:1}}></div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {assetUndoLabel&&<button onClick={undoAsset} data-no-print
              style={{padding:"5px 12px",borderRadius:4,border:`1px solid ${T.or}`,background:`${T.or}15`,color:T.or,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:ff}}>
              ↩ Desfazer: {assetUndoLabel}
            </button>}
            {!showAddRegistryAsset&&<button onClick={()=>setShowAddRegistryAsset(true)} data-no-print
            style={{...btnEd,padding:"5px 12px",fontSize:15}}>
            + Novo Ativo
          </button>}
          </div>
        </div>
        {showAddRegistryAsset&&<div data-no-print style={{background:T.bg,borderRadius:6,border:`1px solid ${T.brd}`,padding:14,marginBottom:14}}>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>

              <div style={{fontSize:14,color:T.txM,marginBottom:3}}>Sistema (descrição)</div>

                  const sys = e.target.value;
                  const match = EQUIP_LIST.find(eq=>eq.system===sys);
                  setNewAssetForm(p=>({...p, system:sys, code:match?match.code:p.code}));
                }} placeholder="Seleccionar ou escrever..." style={{...inputSt,width:"100%"}}/>
              <datalist id="dl-system-new">
                {EQUIP_LIST.map(eq=><option key={eq.code} value={eq.system}/>)}

              <div style={{fontSize:14,color:T.txM,marginBottom:3}}>Código</div>
              <input list="dl-code-new" value={newAssetForm.code} onChange={e=>{
                  const code = e.target.value;
                  const match = EQUIP_LIST.find(eq=>eq.code===code);
                  setNewAssetForm(p=>({...p, code, system:match?match.system:p.system}));
                }} placeholder="Ex: CHIL.AG" style={{...inputSt,width:"100%"}}/>
              <datalist id="dl-code-new">
                {EQUIP_LIST.map(eq=><option key={eq.code} value={eq.code}/>)}
              </datalist>
            </div>
            <div style={{flex:"0 0 110px"}}>
              <div style={{fontSize:14,color:T.txM,marginBottom:3}}>Tipo</div>
              <select value={newAssetForm.assetType||"Individual"} onChange={e=>setNewAssetForm(p=>({...p,assetType:e.target.value}))} style={{...inputSt,width:"100%"}}>
                <option value="Individual">Individual</option>
                <option value="Grupo">Grupo</option>
              </select>
            </div>
            <div style={{flex:"2 1 200px"}}>
              <div style={{fontSize:14,color:T.txM,marginBottom:3}}>Nome / Descrição</div>
              <input value={newAssetForm.name} onChange={e=>setNewAssetForm(p=>({...p,name:e.target.value}))} placeholder="Ex: Chiller 3 — RCUF210WZY" style={{...inputSt,width:"100%"}}/>
            </div>
            <div style={{flex:"1 1 120px"}}>
              <div style={{fontSize:14,color:T.txM,marginBottom:3}}>Marca</div>
              <input value={newAssetForm.brand} onChange={e=>setNewAssetForm(p=>({...p,brand:e.target.value}))} style={{...inputSt,width:"100%"}}/>
            </div>
            <div style={{flex:"1 1 120px"}}>
              <div style={{fontSize:14,color:T.txM,marginBottom:3}}>Modelo</div>
              <input value={newAssetForm.model} onChange={e=>setNewAssetForm(p=>({...p,model:e.target.value}))} style={{...inputSt,width:"100%"}}/>
            </div>

              <div style={{fontSize:14,color:T.txM,marginBottom:3}}>Capacidade</div>
              <input value={newAssetForm.capacity} onChange={e=>setNewAssetForm(p=>({...p,capacity:e.target.value}))} style={{...inputSt,width:"100%"}}/>
            </div>

              <div style={{fontSize:14,color:T.txM,marginBottom:3}}>Localização</div>

              setShowAddRegistryAsset(false);
              touchLastUpdate();
              showToast("✓ Ativo adicionado ao registo");
            }} style={{...btnEd,padding:"7px 16px",fontSize:15,height:34,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>Guardar</button>

              style={{...btnEd,padding:"7px 16px",fontSize:15,height:34,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>Cancelar</button>

              {assetRegistry.map((a,i)=>{
                const isEdA = editingAsset===a.id;
                const statusColor = a.status==="Operacional"?T.gn:a.status==="Inoperacional"?"#E05470":a.status==="Reserva"?T.yl:T.or;
                return (
                  <tr key={a.id} style={{background:i%2===0?T.bg:T.s1,borderBottom:`1px solid ${T.brd}`}}>

                          style={{fontSize:14,width:140,border:`1px solid ${T.brd}`,borderRadius:3,padding:"2px 4px"}} placeholder="Ex: CHIL.AG"/>

                    <td style={{padding:"6px 8px",color:T.tx,minWidth:160}}>{isEdA

                          style={{fontSize:14,width:"100%",border:`1px solid ${T.brd}`,borderRadius:3,padding:"2px 4px"}} placeholder="Descrição do sistema"/>
                        <datalist id={`dl-sys-${a.id}`}>{EQUIP_LIST.map(eq=><option key={eq.code} value={eq.system}/>)}</datalist></>
                      :<span style={{fontSize:14}}>{a.system||"—"}</span>}
                    </td>
                    <td style={{padding:"6px 8px",color:T.tx,minWidth:180}}>{isEdA?<input value={a.name} onChange={e=>setAssetRegistry(prev=>prev.map(x=>x.id===a.id?{...x,name:e.target.value}:x))} style={{fontSize:14,width:"100%",border:`1px solid ${T.brd}`,borderRadius:3,padding:"2px 4px"}}/>:a.name}</td>
                    <td style={{padding:"6px 8px",color:T.txM}}>{isEdA?<input value={a.brand} onChange={e=>setAssetRegistry(prev=>prev.map(x=>x.id===a.id?{...x,brand:e.target.value}:x))} style={{fontSize:14,width:80,border:`1px solid ${T.brd}`,borderRadius:3,padding:"2px 4px"}}/>:a.brand}</td>
                    <td style={{padding:"6px 8px",color:T.txM}}>{isEdA?<input value={a.model} onChange={e=>setAssetRegistry(prev=>prev.map(x=>x.id===a.id?{...x,model:e.target.value}:x))} style={{fontSize:14,width:90,border:`1px solid ${T.brd}`,borderRadius:3,padding:"2px 4px"}}/>:a.model}</td>
                    <td style={{padding:"6px 8px",color:T.txM,whiteSpace:"nowrap"}}>{isEdA?<input value={a.capacity} onChange={e=>setAssetRegistry(prev=>prev.map(x=>x.id===a.id?{...x,capacity:e.target.value}:x))} style={{fontSize:14,width:60,border:`1px solid ${T.brd}`,borderRadius:3,padding:"2px 4px"}}/>:a.capacity}</td>
                    <td style={{padding:"6px 8px",color:T.txM}}>{isEdA?<input value={a.location} onChange={e=>setAssetRegistry(prev=>prev.map(x=>x.id===a.id?{...x,location:e.target.value}:x))} style={{fontSize:14,width:80,border:`1px solid ${T.brd}`,borderRadius:3,padding:"2px 4px"}}/>:a.location}</td>
                    <td style={{padding:"6px 8px",whiteSpace:"nowrap"}}>{isEdA?<select value={a.status} onChange={e=>setAssetRegistry(prev=>prev.map(x=>x.id===a.id?{...x,status:e.target.value}:x))} style={{fontSize:14,padding:"2px"}}><option>Operacional</option><option>Inoperacional</option><option>Reserva</option><option>Em manutenção</option></select>:<span style={{color:statusColor,fontWeight:700,fontSize:14}}>{a.status}</span>}</td>
                    <td style={{padding:"6px 8px",color:T.txM,whiteSpace:"nowrap"}}>{isEdA?<input type="date" value={a.installDate} onChange={e=>setAssetRegistry(prev=>prev.map(x=>x.id===a.id?{...x,installDate:e.target.value}:x))} style={{fontSize:14,border:`1px solid ${T.brd}`,borderRadius:3,padding:"2px 4px"}}/>:fmtDate(a.installDate)}</td>
                    <td style={{padding:"6px 8px",color:T.txM,maxWidth:200}}>{isEdA?<ExpandingNotes value={a.notes||""} onChange={v=>setAssetRegistry(prev=>prev.map(x=>x.id===a.id?{...x,notes:v}:x))}/>:<span style={{fontSize:14}}>{a.notes||"—"}</span>}</td>
                    <td style={{padding:"6px 8px",whiteSpace:"nowrap"}}>
                      <div style={{display:"flex",gap:4}}>
                        <button onClick={()=>{if(!isEdA) saveAssetHistory("Editar ativo",assetRegistry); setEditingAsset(isEdA?null:a.id); if(isEdA) showToast("✓ Ativo actualizado");}}
                          style={{...btnEd,padding:"2px 8px",fontSize:14}}>
                          {isEdA?"✓ OK":"✎"}
                        </button>
                        {!isEdA&&<button onClick={()=>{saveAssetHistory("Eliminar ativo",assetRegistry);setAssetRegistry(prev=>prev.filter(x=>x.id!==a.id));touchLastUpdate();}}
                          style={{padding:"2px 8px",borderRadius:3,border:`1px solid ${T.rd}`,color:T.rd,background:"transparent",fontSize:14,cursor:"pointer",fontFamily:ff}}>🗑</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>}

      {tab==="painel"&&<div data-tab="painel">
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>

          {card("Realizadas",stats.done,T.gn,undefined,"Ordens de serviço concluídas com sucesso")}
          {card("Agendadas",stats.sched,T.yl,undefined,"Ordens de serviço planeadas e ainda não realizadas")}
          {card("Canceladas",stats.cancel,T.rd,undefined,"Ordens de serviço canceladas no período")}
          {card("Preventivas",stats.prev,T.bl,undefined,"Manutenções preventivas activas (exclui canceladas)")}
          {card("Corretivas",stats.corr,T.or,undefined,"Manutenções corretivas activas (exclui canceladas)")}
          {card("Preditivas",stats.pred,T.pu,undefined,"Manutenções preditivas activas (exclui canceladas)")}

                <b style={{color:T.ac}}>Notas:</b> {w.notes}
                {isEd&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                  <div><span style={{fontSize:15,color:T.txM}}>Conclusão</span><ExpandingNotes value={w.conclusion||""} onChange={v=>updateField(w.id,"conclusion",v)} style={{marginTop:2}}/></div>
                  <div><span style={{fontSize:15,color:T.txM}}>Disposição</span><ExpandingNotes value={w.disposition||""} onChange={v=>updateField(w.id,"disposition",v)} style={{marginTop:2}}/></div>
                  <div><span style={{fontSize:15,color:T.txM}}>Peças Substituídas</span><select value={w.parts||""} onChange={e=>updateField(w.id,"parts",e.target.value)} style={{...inputSt,marginTop:2}}><option value="">—</option><option>Não</option><option>Sim</option></select></div>
                </div>}
                {!isEd&&w.conclusion&&<><br/><b style={{color:T.yl}}>Conclusão:</b> {w.conclusion}</>}
                {!isEd&&w.disposition&&<><br/><b style={{color:T.gn}}>Disposição:</b> {w.disposition}</>}
              </td></tr>:null
              ];

            </tbody>
          </table>
        </div>
      </div>}

      {tab==="plano"&&<div data-tab="plano">
        {[
          {freq:"Mensal", label:"ACTIVIDADES MENSAIS 每月活動", labelZh:"每月活動",
           desc:"Medição de parâmetros operacionais, inspeções de segurança, verificações de vazamentos, ruídos, vibrações e isolamento térmico, limpeza básica e registo nas fichas de manutenção.",
           descZh:"測量操作參數、安全檢查、洩漏驗證、噪音、振動和熱絕緣、基本清潔及記錄日誌",
           systems: SYSTEMS},
          {freq:"Trimestral", label:"ACTIVIDADES TRIMESTRAIS 季度活動", labelZh:"季度活動",
           desc:"Purga e limpeza de strainers, limpeza profunda de filtros e verificação de drenos. Registo nas fichas de manutenção.",
           descZh:"清洗和清理過濾器，深度清潔濾網，並檢查排水管道。記錄在維護日誌中。",
           systems: SYSTEMS.filter(s=>["BOMB.CIRC.CHIL","BOMB.CIRC.TORR","SPLI","VC","UTA"].includes(s.id))},
          {freq:"Semestral", label:"ACTIVIDADES SEMESTRAIS 半年活動", labelZh:"半年活動",
           desc:"Lubrificação, verificação de fixações, limpeza de coils, inspeção de componentes e registro de observações (além das mensais).",
           descZh:"潤滑、檢查緊固件、清潔線圈、檢查零件、記錄觀察結果（除每月一次的觀察外）。",
           systems: SYSTEMS},
        ].map(section => {
          const periodHeaders = section.freq==="Trimestral" ? [
            {label:"TRIMESTRE 1 第一季",span:3,months:["Jan","Fev","Mar"]},
            {label:"TRIMESTRE 2 第二季",span:3,months:["Abr","Mai","Jun"]},
            {label:"TRIMESTRE 3 第三季",span:3,months:["Jul","Ago","Set"]},
            {label:"TRIMESTRE 4 第四季",span:3,months:["Out","Nov","Dez"]},
          ] : section.freq==="Semestral" ? [
            {label:"SEMESTRE 1 第一學期",span:6,months:["Jan","Fev","Mar","Abr","Mai","Jun"]},
            {label:"SEMESTRE 2 第二學期",span:6,months:["Jul","Ago","Set","Out","Nov","Dez"]},
          ] : null;

          return (
            <div key={section.freq} style={{marginBottom:24}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr>
                    <th colSpan={15} style={{fontSize:13,fontWeight:400,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,padding:"5px 12px",background:"#f0f0f0",borderBottom:"1px solid #ccc",textAlign:"center"}}>{section.label}</th>
                  </tr></thead>
                  {/* Period header row (Trimestre/Semestre) */}
                  {periodHeaders && <thead><tr>
                    <th colSpan={3} style={{background:T.bg,borderBottom:"1px dashed #ccc"}}/>
                    {periodHeaders.map((ph,pi) => <th key={pi} colSpan={ph.span} style={{textAlign:"center",padding:"5px 4px",fontSize:13,fontWeight:400,color:T.txM,background:T.bg,borderLeft:`1px dashed #ccc`,borderBottom:"1px dashed #ccc",letterSpacing:0.5}}>{ph.label}</th>)}
                  </tr></thead>}
                  <thead><tr>
                    <th style={{textAlign:"center",padding:"7px 8px",color:T.txB,fontSize:13,fontWeight:700,borderBottom:`1px solid #bbb`,minWidth:110,maxWidth:130,width:120,position:"sticky",left:0,background:"#f8f8f8",zIndex:2,whiteSpace:"normal",wordBreak:"break-word",verticalAlign:"middle"}}>Grupo<br/><span style={{fontSize:11,fontWeight:700}}>團體</span></th>
                    <th style={{textAlign:"center",padding:"7px 8px",color:T.txB,fontSize:13,fontWeight:700,borderBottom:`1px solid #bbb`,minWidth:90,position:"sticky",left:120,background:"#f8f8f8",zIndex:2,verticalAlign:"middle"}}>Sistema<br/><span style={{fontSize:11,fontWeight:700}}>系統</span></th>
                    <th style={{textAlign:"center",padding:"7px 8px",color:T.txB,fontSize:13,fontWeight:700,borderBottom:`1px solid #bbb`,minWidth:140,maxWidth:180,position:"sticky",left:210,background:"#f8f8f8",zIndex:2,borderRight:"1px dashed #ccc",verticalAlign:"middle"}}>Descrição Geral das<br/>Atividades Principais<br/><span style={{fontSize:10,fontWeight:700}}>主要活動概況</span></th>
                    {MONTH_KEYS.map(m=><th key={m} style={{textAlign:"center",padding:"7px 4px",color:T.txM,fontSize:13,fontWeight:400,borderBottom:`1px solid #bbb`,background:"#f8f8f8",minWidth:58}}>{m} 26</th>)}
                  </tr></thead>
                  <tbody>
                    {section.systems.map((sys,si) => {
                      const isFirst = si===0;
                      const groupRowSpan = isFirst ? section.systems.length : 0;

                      return (
                        <tr key={`${sys.id}-${section.freq}`}>
                          {isFirst && <td rowSpan={groupRowSpan} style={{padding:"7px 8px",fontWeight:400,color:T.tx,fontSize:13,lineHeight:1.4,borderBottom:`1px dashed #ccc`,verticalAlign:"middle",textAlign:"center",position:"sticky",left:0,background:T.bg,zIndex:1,borderRight:`1px dashed #ccc`,maxWidth:130,width:120,whiteSpace:"normal",wordBreak:"break-word"}}>
                            Instalações de Aquecimento Ventilação e Ar Condicionado (AVAC)<br/><span style={{fontSize:11,color:T.txM}}>暖氣、通風和空調（HVAC）安裝</span>
                          </td>}
                          <td style={{padding:"6px 8px",fontWeight:400,color:T.tx,fontSize:13,borderBottom:`1px dashed #ccc`,position:"sticky",left:120,background:T.bg,zIndex:1,borderRight:`1px dashed #ccc`,verticalAlign:"middle"}}>
                            {sys.name}<br/><span style={{fontSize:12,color:T.txM,fontWeight:400}}>{sys.nameZh}</span>
                          </td>
                          {isFirst && <td rowSpan={groupRowSpan} style={{padding:"8px 10px",fontSize:13,color:T.tx,fontWeight:400,lineHeight:1.5,borderBottom:`1px dashed #ccc`,verticalAlign:"middle",position:"sticky",left:210,background:T.bg,zIndex:1,borderRight:"1px dashed #ccc",maxWidth:180,textAlign:"center"}}>
                            <div style={{textAlign:"center"}}>{section.desc}</div><div style={{textAlign:"center",marginTop:4,color:T.txM,fontSize:11}}>{section.descZh}</div>
                          </td>}
                          {MONTH_KEYS.map(mk => {
                            if(sys.inactive) {
                              const inactiveKey = `${sys.id}_${section.freq}_${mk}_inactive`;
                              const inactiveText = cellCustomText[inactiveKey];
                              const inactiveBg = cellCustomColors[inactiveKey] || "#fff";
                              return <td key={mk} style={{textAlign:"center",padding:"2px",color:T.txM,fontSize:13,background:inactiveBg,borderBottom:`1px dashed #ccc`,borderLeft:`1px dashed #ccc`,position:"relative",minWidth:58}}>
                                <input value={inactiveText!==undefined?inactiveText:"(2)"}
                                  onChange={e=>setCellCustomText(prev=>({...prev,[inactiveKey]:e.target.value}))}
                                  style={{width:"90%",fontSize:11,border:"none",background:"transparent",textAlign:"center",color:T.txM,fontFamily:ff,padding:0}}
                                />
                                <div style={{position:"absolute",top:1,right:1}}
                                  onClick={e=>{e.stopPropagation();setEditing(editing===inactiveKey+"_color"?null:inactiveKey+"_color");}}
                                >
                                  <div title="Escolher cor" style={{width:8,height:8,borderRadius:"50%",background:inactiveBg&&inactiveBg!=="#fff"?inactiveBg:"#ddd",border:"1px solid #aaa",cursor:"pointer"}}/>
                                </div>
                                {editing===inactiveKey+"_color"&&<div style={{position:"absolute",top:12,right:0,zIndex:99,background:T.bg,border:"1px solid #ccc",borderRadius:4,padding:4,boxShadow:"0 2px 8px rgba(0,0,0,0.2)",display:"flex",flexWrap:"wrap",gap:3,width:90}}
                                  onClick={e=>e.stopPropagation()}
                                >
                                  {["#FCE4D6","#FFC000","#92D050","#ED7D31","#7030A0","#FFE0B2","#BDD7EE","#DDEBF7","#E2EFDA","#FFF2CC","#fff"].map(sw=>(
                                    <div key={sw} onClick={e=>{e.stopPropagation();setCellCustomColors(prev=>{const n={...prev};if(n[inactiveKey]===sw)delete n[inactiveKey];else n[inactiveKey]=sw;return n;});setEditing(null);}}
                                      title={sw}
                                      style={{width:12,height:12,background:sw,borderRadius:1,cursor:"pointer",border:inactiveBg===sw?"2px solid #333":"1px solid #ccc",flexShrink:0}}
                                    />
                                  ))}
                                  {inactiveBg&&inactiveBg!=="#fff"&&<div onClick={e=>{e.stopPropagation();setCellCustomColors(p=>{const n={...p};delete n[inactiveKey];return n;});setEditing(null);}}
                                    style={{width:12,height:12,background:T.bg,borderRadius:1,cursor:"pointer",border:"1px solid #999",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:T.txM}}
                                  >×</div>}
                                </div>}
                              </td>;
                            }

                            const days = getPamDays(sys.id, mk, section.freq);
                            const cellKey = `${sys.id}_${section.freq}_${mk}`;
                            const cellStatus = cellStatuses[cellKey] || "pending";
                            const isEditingDays = editing === cellKey;
                            const isCurrent = mk === MONTH_KEYS[parseInt(TODAY.split("-")[1])-1];

                            const hasScheduledDays = days.length > 0;
                            const bgMap = {
                              completed: "#FCE4D6",
                              corrective: "#FFC000",
                              predictive: "#7030A0",
                              cancelled: "#FFE0B2",
                              pending: "#fff",
                            };
                            const colorMap = {
                              completed: "#1a1a1a",
                              corrective: "#fff",
                              predictive: "#fff",
                              cancelled: "#C00000",
                              pending: "#1a1a1a",
                            };
                            // White unless: manually marked (non-pending) OR current month with days (yellow)
                            const isManuallyMarked = cellStatus !== "pending";
                            const cellBg = isManuallyMarked 
                              ? (hasScheduledDays ? bgMap[cellStatus] : "#fff")
                              : "#fff";

                            const customColor = cellCustomColors[cellKey];
                            const customText = cellCustomText[cellKey];
                            const finalBg = customColor || cellBg;
                            // Pick text colour based on background lightness
                            const getTextColor = (bg) => {
                              if(!bg || bg==="#fff" || bg==="#ffffff") return "#1a1a1a";
                              const hex = bg.replace("#","");
                              const r = parseInt(hex.substring(0,2),16);
                              const g = parseInt(hex.substring(2,4),16);
                              const b = parseInt(hex.substring(4,6),16);
                              const lum = (0.299*r + 0.587*g + 0.114*b);
                              return lum > 160 ? "#1a1a1a" : "#fff";
                            };
                            const textColor = customColor ? getTextColor(customColor) : colorMap[cellStatus];

                            return (
                              <td key={mk} style={{textAlign:"center",padding:"2px",background:finalBg,borderBottom:`1px dashed #ccc`,borderLeft:`1px dashed #ccc`,position:"relative",minHeight:28,verticalAlign:"middle",minWidth:58}}>
                                {isEditingDays ? (
                                  <input autoFocus defaultValue={customText!==undefined?customText:days.join(",")}
                                    onBlur={e=>{
                                      const raw=e.target.value.trim();
                                      // Try parse as day numbers
                                      const nums=raw.split(",").map(s=>s.trim()).filter(Boolean);
                                      const allNums=nums.every(s=>/^\d+$/.test(s));
                                      if(allNums && nums.length>0) {
                                        const dayNums=nums.map(Number).filter(n=>n>0&&n<32);
                                        saveDateEdit(sys.id,section.freq,mk,dayNums);
                                        setCellCustomText(prev=>{const n={...prev};delete n[cellKey];return n;});
                                      } else {
                                        // Store as custom text
                                        setCellCustomText(prev=>({...prev,[cellKey]:raw}));
                                        setEditing(null);
                                      }
                                    }}
                                    onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape")setEditing(null);}}
                                    style={{width:"90%",padding:"2px 3px",border:`1px solid ${T.ac}`,borderRadius:3,background:T.s1,color:T.txB,fontSize:13,textAlign:"center",fontFamily:ff}}
                                  />
                                ) : (
                                  <div onClick={()=>setEditing(cellKey)} style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",minHeight:24,padding:"2px 1px"}}>
                                    <span style={{fontWeight:400,color:textColor,fontSize:13,lineHeight:1.2}}>
                                      {customText!==undefined?customText:(days.length>0?days.join(", "):"")}
                                    </span>
                                  </div>
                                )}
                                {/* Colour indicator dot */}
                                {!isEditingDays&&<>
                                  <div style={{position:"absolute",top:1,right:1}}
                                    onClick={e=>{e.stopPropagation();setEditing(editing===cellKey+"_color"?null:cellKey+"_color");}}>
                                    <div title="Escolher cor" style={{width:8,height:8,borderRadius:"50%",background:customColor||"#ddd",border:"1px solid #aaa",cursor:"pointer"}}/>
                                  </div>
                                  {editing===cellKey+"_color"&&<div style={{position:"absolute",top:12,right:0,zIndex:99,background:T.bg,border:"1px solid #ccc",borderRadius:4,padding:4,boxShadow:"0 2px 8px rgba(0,0,0,0.2)",display:"flex",flexWrap:"wrap",gap:3,width:90}}
                                    onClick={e=>e.stopPropagation()}>
                                    {["#FCE4D6","#FFC000","#92D050","#ED7D31","#7030A0","#FFF2CC","#FFE0B2","#BDD7EE","#DDEBF7","#E2EFDA"].map(sw=>(
                                      <div key={sw} onClick={e=>{e.stopPropagation();setCellCustomColors(prev=>{const n={...prev};if(n[cellKey]===sw)delete n[cellKey];else n[cellKey]=sw;return n;});touchLastUpdate();setEditing(null);}}
                                        title={sw}
                                        style={{width:12,height:12,background:sw,borderRadius:1,cursor:"pointer",border:customColor===sw?"2px solid #333":"1px solid #ccc",flexShrink:0}}
                                      />
                                    ))}
                                    {customColor&&<div onClick={e=>{e.stopPropagation();setCellCustomColors(p=>{const n={...p};delete n[cellKey];return n;});setCellCustomText(p=>{const n={...p};delete n[cellKey];return n;});clearCell(sys.id,section.freq,mk);setEditing(null);}}
                                      title="Limpar"
                                      style={{width:12,height:12,background:T.bg,borderRadius:1,cursor:"pointer",border:"1px solid #999",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:T.txM}}
                                    >×</div>}
                                  </div>}
                                </>}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          );
        })}
        <div style={{background:T.s2,borderRadius:6,padding:12,fontSize:14,color:T.txM,lineHeight:1.7,marginTop:4}}>
          <div style={{fontSize:14,fontWeight:400,color:T.txM,marginBottom:6}}>Notas</div>
          {[
            {key:"note1",def:"(1) Sempre que possível, as rotinas de manutenção serão agendadas na 3ª semana de cada mês, salvo excepção do ano novo chinês (2026) e outros feriados."},
            {key:"note2",def:"(2) As unidades de tratamento de ar existentes (UTA) estão não operacionais e consideradas para substituição no futuro plano de remodelação das infraestruturas do Consulado."},
            {key:"note3",def:""},
            {key:"note4",def:""},
            {key:"noteExtra",def:""},
          ].map(n=>{
            const val = footerNotes[n.key] !== undefined ? footerNotes[n.key] : n.def;
            const isEmpty = !val;
            return <div key={n.key} style={{marginBottom:3}} data-no-print={isEmpty?true:undefined}>
              <input value={val} onChange={e=>setFooterNotes(prev=>({...prev,[n.key]:e.target.value}))}
                placeholder={!n.def?"Nota adicional...":""}
                style={{width:"100%",fontSize:14,color:T.txM,border:"none",borderBottom:`1px dashed transparent`,background:"transparent",outline:"none",padding:"2px 0",fontFamily:ff}}
                onFocus={e=>{e.target.style.borderBottomColor=T.brd;}} onBlur={e=>{e.target.style.borderBottomColor="transparent";}}
              />
            </div>;
          })}
          <div style={{display:"flex",gap:14,marginTop:6}}>
            <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:4}}><span style={{width:12,height:12,borderRadius:2,background:"#FCE4D6",border:"1px solid #ccc",display:"inline-block"}}/>Actividades concluídas</span>
            <span style={{fontSize:13,color:T.txM,display:"flex",alignItems:"center",gap:4}}><span style={{width:12,height:12,borderRadius:2,background:"#FFC000",border:"1px solid #ccc",display:"inline-block"}}/>Actividades de manutenção corretiva</span>
          </div>
        </div>
      </div>}

      {tab==="ativos"&&<div data-tab="ativos">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:800,color:T.txB,textTransform:"uppercase",letterSpacing:1}}>Monitorização de Ativos</div>
          <div style={{fontSize:14,color:T.txM,fontStyle:"italic"}}>Actualizado automaticamente a partir das Ordens de Serviço</div>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
            <thead><tr>
              {["ID","Código","Tipo","Sistema / Nome","Estado","Última Manutenção","Dias","Última Corretiva","Total OS","Última OS","Notas"].map(h=>
                <th key={h} style={{textAlign:"left",padding:"6px 10px",fontSize:13,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,fontWeight:700,borderBottom:`2px solid ${T.brd}`,whiteSpace:"nowrap"}}>{h}</th>
              )}
            </tr></thead>
            <tbody>
              {assetRegistry.map((a,i) => {
                const systemWos = wo.filter(w=>w.item===a.code);
                const realizadas = systemWos.filter(w=>w.status==="Realizada").sort((x,y)=>y.date.localeCompare(x.date));
                const corretivas = realizadas.filter(w=>w.type==="Corretiva");
                const lastOs = realizadas[0] || null;
                const lastCorretiva = corretivas[0] || null;
                const lastEvent = lastCorretiva?.date || null;
                const lastMaint = lastOs?.date || null;
                const hasCorr = !!lastEvent;
                const statusColor = a.status==="Operacional"?T.gn:a.status==="Inoperacional"?"#E05470":a.status==="Reserva"?T.yl:T.or;
                const isEd = editingNote === a.id;

                const updateAsset = (field, value) => {
                  setAssetRegistry(prev => prev.map(x => x.id===a.id ? {...x, [field]: value} : x));
                  touchLastUpdate();
                  if(field==="notes" && lastOs) {
                    setWo(prev => prev.map(w => w.id===lastOs.id ? {...w, notes:value} : w));
                  }
                };

                const stOpts = [
                  {v:"Operacional",c:T.gn},{v:"Inoperacional",c:"#E05470"},{v:"Reserva",c:T.yl},{v:"Em manutenção",c:T.or},
                ];
                const curSt = stOpts.find(o=>o.v===a.status);
                const curColor = curSt?curSt.c:T.txM;

                return (
                  <tr key={a.id} style={{background:i%2===0?T.bg:T.s1,borderBottom:`1px solid ${T.brd}`}}>
                    <td style={{padding:"6px 10px",fontSize:13,color:T.txM,whiteSpace:"nowrap"}}>{a.id}</td>
                    <td style={{padding:"6px 10px",fontWeight:700,color:T.txB,whiteSpace:"nowrap"}}>{a.code}</td>
                    <td style={{padding:"6px 10px",fontSize:13,color:a.assetType==="Grupo"?T.ac:T.txM,whiteSpace:"nowrap"}}>{a.assetType||"Individual"}</td>
                    <td style={{padding:"6px 10px",color:T.tx,minWidth:160}}>
                      <div style={{fontSize:13}}>{a.system||a.name}</div>
                      {a.name!==a.system&&<div style={{fontSize:12,color:T.txM}}>{a.name}</div>}
                    </td>
                    <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}>
                      <select value={a.status} onChange={e=>updateAsset("status",e.target.value)}
                        style={{fontSize:13,fontWeight:700,color:curColor,background:"transparent",border:`1px solid ${curColor}`,borderRadius:4,padding:"2px 6px",cursor:"pointer",fontFamily:ff,outline:"none"}}>
                        {stOpts.map(o=><option key={o.v} value={o.v} style={{color:o.c,fontWeight:700}}>{o.v}</option>)}
                      </select>
                    </td>
                    <td style={{padding:"6px 10px",color:T.tx,whiteSpace:"nowrap"}}>{lastMaint?fmtDate(lastMaint):"—"}</td>
                    <td style={{padding:"6px 10px",fontWeight:700,color:lastMaint?T.ac:T.txM,whiteSpace:"nowrap"}}>{lastMaint?`${daysBetween(lastMaint,TODAY)}d`:"—"}</td>
                    <td style={{padding:"6px 10px",color:hasCorr?T.or:T.txM,whiteSpace:"nowrap"}}>{lastEvent?fmtDate(lastEvent):"Nenhuma"}</td>
                    <td style={{padding:"6px 10px",color:T.txB,textAlign:"center"}}>{systemWos.length}</td>
                    <td style={{padding:"6px 10px",color:T.txM,fontSize:13}}>
                      {lastOs?<span><span style={{fontWeight:700,color:T.txB}}>OS#{lastOs.os}</span> · {fmtDate(lastOs.date)} · <span style={{color:lastOs.type==="Corretiva"?T.or:lastOs.type==="Preditiva"?T.pu:T.bl}}>{lastOs.type}</span></span>:"—"}
                    </td>
                    <td style={{padding:"6px 10px",color:T.txM,maxWidth:200}}>
                      {isEd
                        ? <><ExpandingNotes value={a.notes||""} onChange={v=>updateAsset("notes",v)}/><button onClick={()=>setEditingNote(null)} style={{marginTop:3,padding:"1px 6px",border:`1px solid ${T.gn}`,borderRadius:3,background:"transparent",color:T.gn,fontSize:12,cursor:"pointer",fontFamily:ff}}>✓</button></>
                        : <span onClick={()=>setEditingNote(a.id)} style={{cursor:"pointer",fontSize:13}}>{a.notes||<span style={{color:T.brd,fontStyle:"italic"}}>—</span>}</span>
                      }
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>

      {/* ── PAM → OS Generator Modal ── */}
      {showPamGen&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:10000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:40,overflowY:"auto"}} onClick={()=>{setShowPamGen(false);setPamGenPreview(null);}}>
        <div style={{background:T.bg,borderRadius:6,width:"min(720px,95vw)",padding:24,boxShadow:"0 8px 40px rgba(0,0,0,0.2)",border:`1px solid ${T.brd}`}} onClick={e=>e.stopPropagation()}>

          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,paddingBottom:12,borderBottom:`2px solid ${T.hdrGn}`}}>
            <div>
              <div style={{fontSize:17,fontWeight:700,color:T.hdrGn}}>📅 Gerar OS a partir do Plano Anual</div>
              <div style={{fontSize:12,color:T.txM,marginTop:3}}>As OS são criadas como Agendadas — podes editar cada uma individualmente após a criação.</div>
            </div>
            <button onClick={()=>{setShowPamGen(false);setPamGenPreview(null);}} style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer",color:T.txM}}>×</button>
          </div>

          {/* Month selector */}
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,background:T.s1,padding:"10px 14px",borderRadius:5,border:`1px solid ${T.brd}`}}>
            <span style={{fontSize:13,fontWeight:700,color:T.txM}}>Mês a gerar:</span>
            <select value={pamGenMonth} onChange={e=>{
              setPamGenMonth(e.target.value);
              setPamGenPreview(generatePamPreview(e.target.value));
            }} style={{padding:"5px 10px",borderRadius:4,border:`1px solid ${T.brd}`,fontSize:13,fontFamily:ff,cursor:"pointer"}}>
              {MONTH_KEYS.map((mk,i)=><option key={mk} value={mk}>{MONTH_FULL[i]}</option>)}
            </select>
            <span style={{fontSize:12,color:T.txM,marginLeft:4}}>
              {pamGenPreview ? `${pamGenPreview.filter(i=>!i.duplicate).length} OS novas · ${pamGenPreview.filter(i=>i.duplicate).length} já existem` : ""}
            </span>
          </div>

          {/* Preview table */}
          {pamGenPreview&&pamGenPreview.length>0 ? <>
            <div style={{overflowX:"auto",marginBottom:14}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{borderBottom:`2px solid ${T.brd}`,background:T.s1}}>
                  <th style={{padding:"6px 10px",textAlign:"center",color:T.txM,fontWeight:700,fontSize:12,width:36}}>✓</th>
                  <th style={{padding:"6px 10px",textAlign:"left",color:T.txM,fontWeight:700,fontSize:12}}>Sistema</th>
                  <th style={{padding:"6px 10px",textAlign:"left",color:T.txM,fontWeight:700,fontSize:12}}>Frequência</th>
                  <th style={{padding:"6px 10px",textAlign:"left",color:T.txM,fontWeight:700,fontSize:12}}>Data</th>
                  <th style={{padding:"6px 10px",textAlign:"left",color:T.txM,fontWeight:700,fontSize:12}}>Estado</th>
                </tr></thead>
                <tbody>
                  {pamGenPreview.map((item,i)=>(
                    <tr key={i} style={{background:item.duplicate?"#fff8f0":item.selected?"#f0f9f4":"#fff",borderBottom:`1px solid ${T.brd}`,opacity:item.duplicate&&!item.selected?0.6:1}}>
                      <td style={{padding:"6px 10px",textAlign:"center"}}>
                        <input type="checkbox" checked={item.selected}
                          onChange={e=>{
                            const updated = [...pamGenPreview];
                            updated[i] = {...updated[i], selected: e.target.checked};
                            setPamGenPreview(updated);
                          }}
                          style={{cursor:"pointer",width:15,height:15}}/>
                      </td>
                      <td style={{padding:"6px 10px",fontWeight:600,color:T.txB}}>{item.sysId} <span style={{fontSize:11,color:T.txM,fontWeight:400}}>— {item.sysName}</span></td>
                      <td style={{padding:"6px 10px"}}>
                        <span style={{padding:"2px 7px",borderRadius:3,fontSize:12,fontWeight:700,background:item.freq==="Mensal"?`${T.bl}18`:item.freq==="Trimestral"?`${T.pu}18`:`${T.or}18`,color:item.freq==="Mensal"?T.bl:item.freq==="Trimestral"?T.pu:T.or}}>{item.freq}</span>
                      </td>
                      <td style={{padding:"6px 10px",color:T.tx,fontWeight:600}}>{fmtDate(item.date)}</td>
                      <td style={{padding:"6px 10px"}}>
                        {item.duplicate
                          ? <span style={{fontSize:12,color:T.or,fontWeight:600}}>⚠ Já existe OS#{item.existingOs}</span>
                          : <span style={{fontSize:12,color:T.gn,fontWeight:600}}>✓ Nova</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Summary + actions */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.s1,padding:"10px 14px",borderRadius:5,border:`1px solid ${T.brd}`}}>
              <div style={{fontSize:13,color:T.txM}}>
                <span style={{fontWeight:700,color:T.gn}}>{pamGenPreview.filter(i=>i.selected).length} OS</span> serão criadas como <span style={{fontWeight:700}}>Agendadas</span>
                {pamGenPreview.filter(i=>i.duplicate&&i.selected).length>0&&<span style={{color:T.or,marginLeft:8}}>({pamGenPreview.filter(i=>i.duplicate&&i.selected).length} em duplicado — confirmadas)</span>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{
                  // select all non-duplicates
                  setPamGenPreview(pamGenPreview.map(i=>({...i,selected:!i.duplicate})));
                }} style={{padding:"6px 12px",borderRadius:4,border:`1px solid ${T.brd}`,background:T.bg,color:T.txM,fontSize:13,cursor:"pointer",fontFamily:ff}}>Apenas novas</button>
                <button onClick={()=>setPamGenPreview(pamGenPreview.map(i=>({...i,selected:true})))}
                  style={{padding:"6px 12px",borderRadius:4,border:`1px solid ${T.brd}`,background:T.bg,color:T.txM,fontSize:13,cursor:"pointer",fontFamily:ff}}>Seleccionar tudo</button>
                <button onClick={()=>{setShowPamGen(false);setPamGenPreview(null);}}
                  style={{padding:"6px 14px",borderRadius:4,border:`1px solid ${T.brd}`,background:T.bg,color:T.txM,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:ff}}>Cancelar</button>
                <button onClick={()=>confirmPamGenerate(pamGenPreview)}
                  disabled={pamGenPreview.filter(i=>i.selected).length===0}
                  style={{padding:"6px 16px",borderRadius:4,border:"none",background:pamGenPreview.filter(i=>i.selected).length===0?"#e8eaed":T.hdrGn,color:pamGenPreview.filter(i=>i.selected).length===0?"#aaa":"#fff",fontSize:13,fontWeight:700,cursor:pamGenPreview.filter(i=>i.selected).length===0?"default":"pointer",fontFamily:ff}}>
                  ✓ Criar {pamGenPreview.filter(i=>i.selected).length} OS
                </button>
              </div>
            </div>
          </> : pamGenPreview&&pamGenPreview.length===0 ?
            <div style={{textAlign:"center",padding:"30px 0",color:T.txM,fontSize:14}}>
              Sem actividades planeadas no PAM para <strong>{MONTH_FULL[MONTH_KEYS.indexOf(pamGenMonth)]}</strong>.
            </div>
          : null}
        </div>
      </div>}

      {showReport&&(()=>{
        const rWo = wo.filter(w=>w.date>=reportFrom&&w.date<=reportTo);
        const rDone = rWo.filter(w=>w.status==="Realizada");
        const rCancel = rWo.filter(w=>w.status==="Cancelada");
        const rPrev = rDone.filter(w=>w.type==="Preventiva");
        const rCorr = rDone.filter(w=>w.type==="Corretiva");
        const rPred = rDone.filter(w=>w.type==="Preditiva");
        const rIssues = rDone.filter(w=>w.hasIssue||w.notes);
        const rParts = rDone.filter(w=>w.parts==="Sim");
        const byEquip = {};
        rDone.forEach(w=>{if(!byEquip[w.item])byEquip[w.item]={prev:0,corr:0,pred:0,issues:0};byEquip[w.item][w.type==="Corretiva"?"corr":w.type==="Preditiva"?"pred":"prev"]++;if(w.hasIssue||w.notes)byEquip[w.item].issues++;});
        const issues = rDone.filter(w=>w.notes||w.hasIssue);
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:9999,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:40,overflowY:"auto"}} onClick={()=>setShowReport(false)}>
            <div style={{background:T.bg,borderRadius:8,width:"min(860px,95vw)",padding:24,boxShadow:"0 8px 40px rgba(0,0,0,0.25)",position:"relative"}} onClick={e=>e.stopPropagation()}>
              {/* Header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
                <div>
                  <div style={{fontSize:19,fontWeight:800,color:T.txB}}>📋 Relatório Sumário de Manutenção</div>
                  <div style={{fontSize:14,color:T.txM,marginTop:2}}>Consulado Geral de Portugal em Macau e Hong Kong</div>
                </div>
                <button onClick={()=>setShowReport(false)} style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer",color:T.txM,lineHeight:1}}>×</button>
              </div>
              {/* Period selector */}
              <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:18,background:T.s1,borderRadius:6,padding:"10px 14px",flexWrap:"wrap"}}>
                <span style={{fontSize:14,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.5}}>Período:</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <label style={{fontSize:13,color:T.txM}}>De</label>
                  <input type="date" value={reportFrom} onChange={e=>setReportFrom(e.target.value)} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.brd}`,fontSize:13,fontFamily:ff}}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <label style={{fontSize:13,color:T.txM}}>Até</label>
                  <input type="date" value={reportTo} onChange={e=>setReportTo(e.target.value)} style={{padding:"4px 8px",borderRadius:4,border:`1px solid ${T.brd}`,fontSize:13,fontFamily:ff}}/>
                </div>
                <button onClick={()=>{
                  const win=window.open("","_blank");
                  const clientLogo = projectConfig.clientLogo || "";
                  const clientName = projectConfig.clientName || "";
                  const clientSubtitle = projectConfig.clientSubtitle || "";
                  const providerLogo = projectConfig.providerLogo || "";
                  const providerName = projectConfig.providerName || "";
                  const BLUE = "#1F3864";
                  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatório Sumário</title><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
@page { size: A4 portrait; margin: 16mm 14mm 24mm 14mm; }
@media print {
  html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .fixed-footer { position: fixed; bottom: 0; left: 0; right: 0; height: 20mm; display: flex; align-items: flex-end; padding-bottom: 4mm; }
}
body { font-family: Arial, sans-serif; font-size: 11px; color: #111; line-height: 1.5; }

/* ── Header ── */
.header { display: flex; flex-direction: column; align-items: center; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #ccc; }
.header-inner { display: flex; align-items: center; gap: 14px; }
.header-logo { max-height: 70px; max-width: 80px; object-fit: contain; }
.header-names { display: flex; flex-direction: column; }
.header-names .cn { font-size: 12px; font-weight: 700; color: #222; letter-spacing: 0.3px; font-variant: small-caps; }
.header-names .cs { font-size: 11px; color: #444; margin-top: 2px; }
.report-title { margin-top: 10px; font-size: 11px; color: #555; letter-spacing: 0.3px; }

/* ── Section headings ── */
h2 { font-size: 13px; font-weight: 700; color: ${BLUE}; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 2px solid ${BLUE}; }

/* ── Tables — label col dark blue, value col white ── */
table { width: 100%; border-collapse: collapse; margin-top: 4px; font-size: 11px; }
td, th { border: 1px solid #b0b8c8; padding: 5px 9px; vertical-align: top; }
.info-table td:first-child { background: ${BLUE}; color: #fff; font-weight: 700; width: 38%; }
.info-table td:last-child { background: #fff; color: #111; }
.data-table th { background: ${BLUE}; color: #fff; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.data-table td { background: #fff; }
.data-table tr:nth-child(even) td { background: #f4f6fb; }

/* ── Stat boxes ── */
.stats { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 4px; }
.stat-box { border: 1px solid #b0b8c8; border-top: 3px solid ${BLUE}; padding: 6px 10px; min-width: 72px; background: #fff; }
.stat-box .sv { font-size: 20px; font-weight: 800; color: ${BLUE}; line-height: 1.1; }
.stat-box .sl { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

/* ── Fixed footer ── */
.fixed-footer { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
.footer-left { display: flex; align-items: center; gap: 8px; }
.footer-left img { max-height: 36px; max-width: 100px; object-fit: contain; }
.footer-left span { font-size: 9px; color: #666; }
.footer-center { font-size: 9px; color: #888; text-align: center; flex: 1; }
.footer-right { width: 100px; }
</style></head><body>`);

                  // ── Header ──
                  win.document.write(`<div class="header"><div class="header-inner">`);
                  if(clientLogo) win.document.write(`<img class="header-logo" src="${clientLogo}" alt=""/>`);
                  win.document.write(`<div class="header-names"><div class="cn">${clientName}</div>${clientSubtitle?`<div class="cs">${clientSubtitle}</div>`:""}</div>`);
                  win.document.write(`</div><div class="report-title">Relatório Sumário de Manutenção AVAC &nbsp;·&nbsp; Período: ${fmtDate(reportFrom)} a ${fmtDate(reportTo)} &nbsp;·&nbsp; Gerado em: ${fmtDate(TODAY)}</div></div>`);

                  // ── Stats ──
                  win.document.write(`<h2>Resumo Geral</h2><div class="stats">`);
                  [[rDone.length,"Total OS"],[rPrev.length,"Preventivas"],[rCorr.length,"Corretivas"],[rPred.length,"Preditivas"],[rCancel.length,"Canceladas"],[rIssues.length,"Ocorrências"],[rParts.length,"Subst. Comp."]].forEach(([v,l])=>{
                    win.document.write(`<div class="stat-box"><div class="sv">${v}</div><div class="sl">${l}</div></div>`);
                  });
                  win.document.write(`</div>`);

                  // ── By equipment ──
                  win.document.write(`<h2>Actividades por Equipamento</h2><table class="data-table"><tr><th>Código</th><th>Preventiva</th><th>Corretiva</th><th>Preditiva</th><th>Ocorrências</th></tr>`);
                  Object.entries(byEquip).forEach(([code,v])=>{win.document.write(`<tr><td><b>${code}</b></td><td>${v.prev}</td><td>${v.corr}</td><td>${v.pred}</td><td>${v.issues}</td></tr>`);});
                  win.document.write(`</table>`);

                  // ── Issues ──
                  if(issues.length>0){
                    win.document.write(`<h2>Ocorrências / Notas Relevantes</h2><table class="data-table"><tr><th>Data</th><th>OS#</th><th>Código</th><th>Tipo</th><th>Nota</th></tr>`);
                    issues.forEach(w=>win.document.write(`<tr><td>${fmtDate(w.date)}</td><td>${w.os}</td><td>${w.item}</td><td>${w.type}</td><td>${w.notes||"—"}</td></tr>`));
                    win.document.write(`</table>`);
                  }

                  // ── WO list ──
                  win.document.write(`<h2>Lista Detalhada de Ordens de Serviço</h2><table class="data-table"><tr><th>OS#</th><th>Data</th><th>ID</th><th>Código</th><th>Freq.</th><th>Tipo</th><th>Estado</th><th>Subst.</th><th>Notas</th></tr>`);
                  rWo.forEach(w=>win.document.write(`<tr><td>${w.os}</td><td>${fmtDate(w.date)}</td><td>${w.assetId||"—"}</td><td>${w.item}</td><td>${w.freq}</td><td>${w.type}</td><td>${w.status}</td><td>${w.parts||"—"}</td><td>${w.notes||""}</td></tr>`));
                  win.document.write(`</table>`);

                  // ── Fixed footer: provider logo bottom-left, page number centred ──
                  win.document.write(`<div class="fixed-footer">`);
                  win.document.write(`<div class="footer-left">${providerLogo?`<img src="${providerLogo}" alt=""/>`:""}<span>${providerName}</span></div>`);
                  win.document.write(`<div class="footer-center">— <span id="pn">1</span> —</div>`);
                  win.document.write(`<div class="footer-right"></div>`);
                  win.document.write(`</div>`);
                  win.document.write(`</body></html>`);
                  win.document.close(); win.print();
                }} style={{marginLeft:"auto",padding:"6px 14px",borderRadius:4,border:`1px solid ${T.hdrGn}`,background:T.hdrGn,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:ff}}>🖨 Imprimir / PDF</button>
              </div>
              {/* Stats cards */}
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
                {[[`${rDone.length}`,`Total realizadas`,T.gn],[`${rPrev.length}`,`Preventivas`,T.bl],[`${rCorr.length}`,`Corretivas`,T.or],[`${rPred.length}`,`Preditivas`,T.pu],[`${rCancel.length}`,`Canceladas`,"#E05470"],[`${rIssues.length}`,`Com ocorrência`,T.or],[`${rParts.length}`,`Subst. componentes`,"#0891b2"]].map(([v,l,c])=>(
                  <div key={l} style={{background:T.bg,borderRadius:5,padding:"10px 14px",borderLeft:`3px solid ${c}`,border:`1px solid ${T.brd}`,flex:"1 1 90px",minWidth:80}}>
                    <div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div>
                    <div style={{fontSize:12,color:T.txM,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginTop:2}}>{l}</div>
                  </div>
                ))}
              </div>
              {/* By equipment */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>Actividades por Equipamento</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{borderBottom:`2px solid ${T.brd}`}}>
                    {["Código","Preventiva","Corretiva","Preditiva","Ocorrências"].map(h=><th key={h} style={{textAlign:"left",padding:"5px 8px",color:T.txM,fontWeight:700,fontSize:12,textTransform:"uppercase"}}>{h}</th>)}
                  </tr></thead>
                  <tbody>{Object.entries(byEquip).map(([code,v],i)=>(
                    <tr key={code} style={{background:i%2===0?T.bg:T.s1,borderBottom:`1px solid ${T.brd}`}}>
                      <td style={{padding:"5px 8px",fontWeight:700,color:T.txB}}>{code}</td>
                      <td style={{padding:"5px 8px",color:v.prev>0?T.bl:T.txM,fontWeight:v.prev>0?700:400}}>{v.prev||"—"}</td>
                      <td style={{padding:"5px 8px",color:v.corr>0?T.or:T.txM,fontWeight:v.corr>0?700:400}}>{v.corr||"—"}</td>
                      <td style={{padding:"5px 8px",color:v.pred>0?T.pu:T.txM,fontWeight:v.pred>0?700:400}}>{v.pred||"—"}</td>
                      <td style={{padding:"5px 8px",color:v.issues>0?"#E05470":T.txM,fontWeight:v.issues>0?700:400}}>{v.issues||"—"}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
              {/* Issues */}
              {issues.length>0&&<div style={{marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>Ocorrências / Notas Relevantes</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{borderBottom:`2px solid ${T.brd}`}}>
                    {["Data","OS#","Código","Tipo","Nota"].map(h=><th key={h} style={{textAlign:"left",padding:"5px 8px",color:T.txM,fontWeight:700,fontSize:12,textTransform:"uppercase"}}>{h}</th>)}
                  </tr></thead>
                  <tbody>{issues.map((w,i)=>(
                    <tr key={w.id} style={{background:i%2===0?"#fff":"#fff8f0",borderBottom:`1px solid ${T.brd}`}}>
                      <td style={{padding:"5px 8px",color:T.txM,whiteSpace:"nowrap"}}>{fmtDate(w.date)}</td>
                      <td style={{padding:"5px 8px",fontWeight:700,color:T.txB}}>{w.os}</td>
                      <td style={{padding:"5px 8px",fontWeight:700,color:T.txB}}>{w.item}</td>
                      <td style={{padding:"5px 8px",color:w.type==="Corretiva"?T.or:T.bl}}>{w.type}</td>
                      <td style={{padding:"5px 8px",color:T.tx,fontSize:12}}>{w.notes||"—"}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>}
              {rWo.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:T.txM,fontSize:15}}>Sem ordens de serviço no período seleccionado.</div>}
            </div>
          </div>
        );
      })()}

    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error:null}; }
  static getDerivedStateFromError(e) { return {error:e}; }
  render() {
    if(this.state.error) return <div style={{padding:20,color:"red",fontFamily:"monospace",whiteSpace:"pre-wrap",fontSize:14}}>ERRO: {String(this.state.error?.message||this.state.error)}</div>;
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
