    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,"0");
    const d = String(now.getDate()).padStart(2,"0");
    setLastUpdate(`${y}-${m}-${d}`);
  }, []);

  const saveHistory = useCallback((label, snapshot) => {
    setWoHistory(prev => [...prev.slice(-19), snapshot]);
    setUndoLabel(label);
    if(undoTimer) clearTimeout(undoTimer);
    const t = setTimeout(() => setUndoLabel(null), 8000);
    setUndoTimer(t);
  }, [undoTimer]);

  const undo = useCallback(() => {
    setWoHistory(prev => {
      if(prev.length===0) return prev;
      setWo(prev[prev.length-1]);
      setUndoLabel(null);
      return prev.slice(0,-1);
    });
  }, []);

  const saveAssetHistory = useCallback((label, snapshot) => {
    setAssetHistory(prev => [...prev.slice(-19), snapshot]);
    setAssetUndoLabel(label);
    if(assetUndoTimer) clearTimeout(assetUndoTimer);
    const t = setTimeout(() => setAssetUndoLabel(null), 8000);
    setAssetUndoTimer(t);
  }, [assetUndoTimer]);

    setAssetHistory(prev => {
      if(prev.length===0) return prev;
      setAssetRegistry(prev[prev.length-1]);
      setAssetUndoLabel(null);
      return prev.slice(0,-1);
    });
  }, []);

  const setCellStatus = useCallback((cellKey, status) => {
    setCellStatuses(prev => ({...prev, [cellKey]: status}));
    touchLastUpdate();
  }, [touchLastUpdate]);

    setMonitoredAssets(prev => prev.map(a => a.system===system ? {...a, notes:note} : a));

    if(dateEdits[key]?.length > 0) return dateEdits[key];
    if(freq==="Mensal") return PAM_MENSAL[sysId]?.[monthKey] || [];
    if(freq==="Trimestral") {
      const q = PAM_TRIMESTRAL[sysId]; if(!q) return [];
      for(const t of ["T1","T2","T3","T4"]) { if(q[t]?.[monthKey]) return q[t][monthKey]; }
      return [];
    }
    if(freq==="Semestral") {
      const s = PAM_SEMESTRAL[sysId]; if(!s) return [];
      for(const sem of ["S1","S2"]) { if(s[sem]?.[monthKey]) return s[sem][monthKey]; }
      return [];
    }
    return [];
  }, [dateEdits]);

    setDateEdits(prev => ({...prev, [key]: newDays}));

    setDateEdits(prev => { const n={...prev}; delete n[key]; return n; });

            <table style={{width:"100%",borderCollapse:"collapse",fontSize:15,fontFamily:"Arial,sans-serif"}}>
              <thead>

                  const lastOs = allOsForCode[0] || null;
                  const note = equipNotes[code] !== undefined ? equipNotes[code] : (lastOs?.notes || "");
                  const cond = equipCondition[code] || "";
                  return (
                    <tr key={code} style={{borderBottom:`1px solid ${T.brd}`}}>

                              value={note}
                              onChange={e=>{

                          style={{width:"100%",fontSize:14,color:T.tx,fontWeight:400,border:"none",borderBottom:`1px dashed ${T.brd}`,background:"transparent",outline:"none",padding:"3px 0",cursor:"pointer",fontFamily:"Arial,sans-serif"}}

                  );

                        <div style={{display:"flex",flexDirection:"column-reverse",alignItems:"center",width:"100%",gap:1}}>
                          {predH>0&&<div style={{width:"80%",height:predH,background:T.pu,borderRadius:"2px 2px 0 0",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {predH>14&&<span style={{fontSize:13,color:"#fff",fontWeight:700}}>{m.pred}</span>}
                          </div>}
                          {corrH>0&&<div style={{width:"80%",height:corrH,background:T.or,borderRadius:predH>0?"0":"2px 2px 0 0",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {corrH>14&&<span style={{fontSize:13,color:"#fff",fontWeight:700}}>{m.corr}</span>}
                          </div>}
                          {prevH>0&&<div style={{width:"80%",height:prevH,background:T.gn,borderRadius:(corrH>0||predH>0)?"0":"2px 2px 0 0",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {prevH>14&&<span style={{fontSize:13,color:"#fff",fontWeight:700}}>{m.prev}</span>}
                          </div>}
                          {total===0&&<div style={{width:"80%",height:4,background:"#333",borderRadius:2}}/>}
                        </div>
                        <div style={{fontSize:13,color:isCurr?"#FFF2CC":"#aaa",marginTop:4,fontWeight:isCurr?700:400}}>{MONTH_KEYS[i].toLowerCase().slice(0,3)}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",gap:14,marginTop:8,justifyContent:"center"}}>
                  <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:T.gn,borderRadius:2}}/>Manutenção Preventiva</span>
                  <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:T.or,borderRadius:2}}/>Manutenção Corretiva</span>
                  <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:T.pu,borderRadius:2}}/>Manutenção Preditiva</span>
                </div>
              </div>
            );
          })()}

          {/* Line chart — tendência */}
          {(()=>{
            const W=460, H=160, padL=30, padB=24, padT=10, padR=10;
            const maxVal = Math.max(...monthStats.map(m=>m.total),1);
            const pts = monthStats.map((m,i)=>{
              const x = padL + (i/(11))*(W-padL-padR);
              const y = padT + (1-m.total/maxVal)*(H-padT-padB);
              return {x,y,v:m.total,label:MONTH_KEYS[i]};
            });
            const pathD = pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
            const fillD = `${pathD} L${pts[pts.length-1].x.toFixed(1)},${(H-padB).toFixed(1)} L${pts[0].x.toFixed(1)},${(H-padB).toFixed(1)} Z`;
            return (
              <div style={{background:"#1e2530",borderRadius:8,padding:16,color:"#fff"}}>
                <div style={{fontSize:17,fontWeight:700,color:"#fff",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:16}}>▦</span> Manutenções por Mês
                </div>
                <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
                  {/* Grid lines */}
                  {[0,1,2,3].map(v=>{
                    const y = padT+(v/3)*(H-padT-padB);
                    const val = Math.round(maxVal*(1-v/3));
                    return <g key={v}>
                      <line x1={padL} y1={y} x2={W-padR} y2={y} stroke="#333" strokeWidth={1}/>
                      <text x={padL-4} y={y+4} fill="#888" fontSize={9} textAnchor="end">{val}</text>
                    </g>;
                  })}
                  {/* Fill */}
                  <path d={fillD} fill="#2196F330" stroke="none"/>
                  {/* Line */}
                  <path d={pathD} fill="none" stroke="#2196F3" strokeWidth={2}/>
                  {/* Dots + labels */}
                  {pts.map((p,i)=><g key={i}>
                    <circle cx={p.x} cy={p.y} r={3} fill="#2196F3"/>
                    <text x={p.x} y={H-padB+14} fill="#888" fontSize={9} textAnchor="middle">{p.label.toLowerCase().slice(0,3)}</text>
                  </g>)}
                </svg>
              </div>
            );
          })()}
        </div>

        {/* ── Row 2: Four donuts ── */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:14}}>
          {/* Volume por Tipo */}
          <div style={{background:"#1e2530",borderRadius:8,padding:16,textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:10,display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
              <span style={{fontSize:14}}>▦</span> Volume por Tipo
            </div>
            <Donut data={[{v:stats.corr,c:T.or},{v:stats.pred,c:T.pu},{v:stats.prev,c:T.gn}]} dark={true} size={100}/>
            <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:10,alignItems:"flex-start",paddingLeft:8}}>
              <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:T.or,borderRadius:2}}/>Manutenção Corretiva</span>
              <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:T.pu,borderRadius:2}}/>Manutenção Preditiva</span>
              <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:T.gn,borderRadius:2}}/>Manutenção Preventiva</span>
            </div>
          </div>
          {/* Troca de Peças */}
          {(()=>{
            const no=wo.filter(w=>w.parts==="Não").length;
            const sim=wo.filter(w=>w.parts==="Sim").length;
            const tot=no+sim||1;
            return (
              <div style={{background:"#1e2530",borderRadius:8,padding:16,textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:10,display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
                  <span style={{fontSize:14}}>▦</span> Necessário Troca de Peças
                </div>
                <Donut data={[{v:no,c:"#2196F3"},{v:sim,c:T.or}]} dark={true} size={100}/>
                <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:10,alignItems:"flex-start",paddingLeft:8}}>
                  <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:"#2196F3",borderRadius:2}}/>{Math.round(no/tot*100)}% Não</span>
                  <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:T.or,borderRadius:2}}/>{Math.round(sim/tot*100)}% Sim</span>
                </div>
              </div>
            );
          })()}
          {/* Conclusão */}
          {(()=>{
            const agendar=wo.filter(w=>w.conclusion?.includes("Agendar")).length;
            const apto=wo.filter(w=>w.conclusion?.includes("Apto")||w.disposition?.includes("Apto")).length;
            const descarte=wo.filter(w=>w.disposition?.toLowerCase().includes("descarte")).length;
            return (
              <div style={{background:"#1e2530",borderRadius:8,padding:16,textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:10,display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
                  <span style={{fontSize:14}}>▦</span> Conclusão após Manutenção
                </div>
                <Donut data={[{v:agendar,c:"#2196F3"},{v:apto,c:T.or},{v:descarte,c:T.gn}]} dark={true} size={100}/>
                <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:10,alignItems:"flex-start",paddingLeft:8}}>
                  <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:"#2196F3",borderRadius:2}}/>Agendar outra manutenção</span>
                  <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:T.or,borderRadius:2}}/>Apto para serviço</span>
                  <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:T.gn,borderRadius:2}}/>Direcionar para descarte</span>
                </div>
              </div>
            );
          })()}
          {/* Status */}
          {(()=>{
            const tot=stats.done+stats.sched||1;
            return (
              <div style={{background:"#1e2530",borderRadius:8,padding:16,textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:10,display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
                  <span style={{fontSize:14}}>▦</span> Status de Manutenção
                </div>
                <Donut data={[{v:stats.sched,c:T.or},{v:stats.done,c:"#2196F3"}]} dark={true} size={100}/>
                <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:10,alignItems:"flex-start",paddingLeft:8}}>
                  <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:T.or,borderRadius:2}}/>{Math.round(stats.sched/tot*100)}% Agendada</span>
                  <span style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,background:"#2196F3",borderRadius:2}}/>{Math.round(stats.done/tot*100)}% Realizada</span>
                </div>
              </div>
            );
          })()}
        </div>

        {/* ── Resumo table ── */}
        <div style={{background:"#fff",borderRadius:6,border:`1px solid ${T.brd}`,padding:16}}>
          <div style={{fontSize:17,fontWeight:700,color:T.txM,textTransform:"uppercase",letterSpacing:0.8,marginBottom:10}}>Resumo e Previsões — 2026</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:15}}>
              <thead><tr>
                <th style={{textAlign:"left",padding:"5px 8px",color:T.txM,fontSize:15,borderBottom:`1px solid ${T.brd}`}}>Tipo</th>
                {MONTH_KEYS.map(m=><th key={m} style={{textAlign:"center",padding:"5px 4px",color:T.txM,fontSize:15,borderBottom:`1px solid ${T.brd}`}}>{m}</th>)}
                <th style={{textAlign:"center",padding:"5px 6px",color:T.txB,fontSize:15,fontWeight:800,borderBottom:`1px solid ${T.brd}`}}>Total</th>
              </tr></thead>
              <tbody>
                {[["Total de Actividades","total",T.txB],["Preventiva","prev",T.bl],["Corretiva","corr",T.or],["Preditiva","pred",T.pu]].map(([label,key,color])=>(
                  <tr key={key}>
                    <td style={{padding:"5px 8px",fontWeight:600,color,borderBottom:`1px solid ${T.brd}`}}>{label}</td>
                    {monthStats.map((m,i)=><td key={i} style={{textAlign:"center",padding:"5px 4px",color:m[key]>0?color:T.txM,fontWeight:m[key]>0?700:400,borderBottom:`1px solid ${T.brd}`}}>{m[key]}</td>)}
                    <td style={{textAlign:"center",padding:"5px 6px",fontWeight:800,color,borderBottom:`1px solid ${T.brd}`}}>{monthStats.reduce((s,m)=>s+m[key],0)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>}

      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error:null}; }
  static getDerivedStateFromError(e) { return {error:e}; }
  render() {
    if(this.state.error) return <div style={{padding:20,color:"red",fontFamily:"monospace",whiteSpace:"pre-wrap",fontSize:14}}>ERRO: {String(this.state.error?.message||this.state.error)}</div>;
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
